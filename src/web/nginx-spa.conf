server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Статические ассеты с долгим кэшем (Vite генерирует хэшированные имена)
    location ~* \.(js|css|png|jpg|jpeg|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — все маршруты возвращают index.html (React Router обработает)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
}
