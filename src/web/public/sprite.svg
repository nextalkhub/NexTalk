    </symbol>

    <!-- Микрофон выключен -->
    <symbol id="icon-mic-off" viewBox="0 0 24 24" fill="none">
        <path d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M3 3l18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- Микрофон включен -->
    <symbol id="icon-mic" viewBox="0 0 24 24" fill="none">
        <path d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>

    <!-- Наушники (звук включен) -->
    <symbol id="icon-headphones" viewBox="0 0 24 24" fill="none">
        <path d="M3 12h2a2 2 0 012 2v4a2 2 0 01-2 2H3v-8zm18 0h-2a2 2 0 00-2 2v4a2 2 0 002 2h2v-8z" stroke="currentColor" stroke-width="2"/>
        <path d="M12 2a10 10 0 00-10 10" stroke="currentColor" stroke-width="2"/>
        <path d="M22 12a10 10 0 00-10-10" stroke="currentColor" stroke-width="2"/>
    </symbol>

    <!-- Наушники выключены (глухота) -->
    <symbol id="icon-headphones-off" viewBox="0 0 24 24" fill="none">
