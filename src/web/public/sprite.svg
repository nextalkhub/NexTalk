        <circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="2"/>
        <path d="M23 21v-2a4 4 0 00-3-3.87" stroke="currentColor" stroke-width="2"/>
        <path d="M16 3.13a4 4 0 010 7.75" stroke="currentColor" stroke-width="2"/>
