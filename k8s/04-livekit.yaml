---
# LiveKit config. Keys must match livekit-api-key / livekit-secret-key in 01-secrets.yaml.
# redis.address uses the k8s Service name (same namespace → short DNS name resolves).
apiVersion: v1
kind: ConfigMap
metadata:
  name: livekit-config
  namespace: nextalk
data:
  livekit.yaml: |
    port: 7880
    log_level: info

    rtc:
      tcp_port: 7881
      port_range_start: 50000
      port_range_end: 50200
      use_external_ip: false

    redis:
      address: redis:6379

    keys:
      devkey: devsecret

    room:
      auto_create: true
      empty_timeout: 300

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: livekit
  namespace: nextalk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: livekit
  template:
    metadata:
      labels:
        app: livekit
    spec:
      # LiveKit requires host networking per official docs:
      # https://docs.livekit.io/transport/self-hosting/kubernetes/
      # "LiveKit pods requires direct access to the network with host networking"
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      # Disable k8s service-link env vars: k8s would inject LIVEKIT_PORT=tcp://...
      # which LiveKit binary tries to parse as uint (port number) → crash on startup.
      enableServiceLinks: false
      containers:
        - name: livekit
          image: livekit/livekit-server:v1.11
          args: ["--config", "/etc/livekit.yaml"]
          ports:
            - containerPort: 7880
              name: http
            - containerPort: 7881
              name: rtc-tcp
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/livekit.yaml
              subPath: livekit.yaml
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: livekit-config

---
# HTTP and RTC-TCP are accessible via ClusterIP Service.
# WebRTC UDP traffic reaches LiveKit directly via hostPort (bypasses Service).
apiVersion: v1
kind: Service
metadata:
  name: livekit
  namespace: nextalk
spec:
  selector:
    app: livekit
  ports:
    - name: http
      port: 7880
      targetPort: 7880
    - name: rtc-tcp
      port: 7881
      targetPort: 7881
      protocol: TCP
  type: ClusterIP
