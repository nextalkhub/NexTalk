# Non-sensitive application configuration.
# Sensitive values are in 01-secrets.yaml.
# Change ZITADEL_DOMAIN and ZITADEL_EXTERNALPORT to match your node.
apiVersion: v1
kind: ConfigMap
metadata:
  name: nextalk-config
  namespace: nextalk
data:
  ASPNETCORE_ENVIRONMENT: Production

  # Zitadel needs a public address reachable from the browser.
  # On a local k3s node, use the node IP or keep localhost.
  ZITADEL_DOMAIN: "localhost"
  ZITADEL_EXTERNALPORT: "80"
  ZITADEL_PUBLIC_SCHEME: http
  ZITADEL_EXTERNALSECURE: "false"
  ZITADEL_ACCESS_LOG_STDOUT_ENABLED: "true"
  LOGIN_CLIENT_PAT_EXPIRATION: "2099-12-31T23:59:59Z"