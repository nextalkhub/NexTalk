---
# Nginx Ingress Controller must be installed before applying this file.
# For k3s (with ServiceLB built-in):
#   kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.11.0/deploy/static/provider/cloud/deploy.yaml
#
# Routing mirrors nginx.conf.template from docker-compose:
#   /api/guilds, /api/invites   → guild-service:5001
#   /api/channels, /api/messages → messaging-service:5002
#   /api/voice                  → voice-service:5003
#   /ws                         → websocket-gateway:5004  (WebSocket)
#   /ui/v2/login                → zitadel:3000            (login UI)
#   /                           → zitadel:8080            (OIDC / all other zitadel routes)
#   /monitoring/grafana         → grafana:3000            (optional, for demo access)
#   /monitoring/kibana          → kibana:5601             (optional, for demo access)
#
# NOTE: /internal/* is blocked - no backend configured, returns 404.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nextalk
  namespace: nextalk
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    # WebSocket support for /ws (SignalR)
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          # --- NexTalk .NET services ---
          - path: /api/guilds
            pathType: Prefix
            backend:
              service:
                name: guild-service
                port:
                  number: 5001
          - path: /api/invites
            pathType: Prefix
            backend:
              service:
                name: guild-service
                port:
                  number: 5001
          - path: /api/channels
            pathType: Prefix
            backend:
              service:
                name: messaging-service
                port:
                  number: 5002
          - path: /api/messages
            pathType: Prefix
            backend:
              service:
                name: messaging-service
                port:
                  number: 5002
          - path: /api/voice
            pathType: Prefix
            backend:
              service:
                name: voice-service
                port:
                  number: 5003
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: websocket-gateway
                port:
                  number: 5004
          # --- Observability (direct access for demo) ---
          - path: /monitoring/grafana
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
          - path: /monitoring/kibana
            pathType: Prefix
            backend:
              service:
                name: kibana
                port:
                  number: 5601
          # --- Zitadel Login UI ---
          - path: /ui/v2/login
            pathType: Prefix
            backend:
              service:
                name: zitadel
                port:
                  number: 3000
          # --- Zitadel API / OIDC catch-all (least specific → must be last) ---
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zitadel
                port:
                  number: 8080
