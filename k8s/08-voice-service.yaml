---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: voice-service
  namespace: nextalk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: voice-service
  template:
    metadata:
      labels:
        app: voice-service
    spec:
      containers:
        - name: voice-service
          image: ghcr.io/garaevildar/nextalk/voice-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5003
          env:
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: nextalk-config
                  key: ASPNETCORE_ENVIRONMENT
            - name: ASPNETCORE_URLS
              value: http://+:5003
            - name: ZITADEL_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: nextalk-config
                  key: ZITADEL_DOMAIN
            - name: ZITADEL_EXTERNALPORT
              valueFrom:
                configMapKeyRef:
                  name: nextalk-config
                  key: ZITADEL_EXTERNALPORT
            - name: Zitadel__Authority
              value: "http://$(ZITADEL_DOMAIN):$(ZITADEL_EXTERNALPORT)"
            - name: Zitadel__MetadataAddress
              value: http://zitadel:8080/.well-known/openid-configuration
            - name: LiveKit__Host
              value: http://livekit:7880
            - name: LiveKit__ApiKey
              valueFrom:
                secretKeyRef:
                  name: nextalk-secrets
                  key: livekit-api-key
            - name: LiveKit__SecretKey
              valueFrom:
                secretKeyRef:
                  name: nextalk-secrets
                  key: livekit-secret-key
            - name: Services__GuildService
              value: http://guild-service:5001
          startupProbe:
            httpGet:
              path: /healthz
              port: 5003
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: 5003
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5003
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

---
apiVersion: v1
kind: Service
metadata:
  name: voice-service
  namespace: nextalk
spec:
  selector:
    app: voice-service
  ports:
    - port: 5003
      targetPort: 5003
