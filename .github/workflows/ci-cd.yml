name: CI / CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/nextalk

jobs:
  # Build & test (every branch, every PR)
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: guild-service
            project: src/guild-service/NexTalk.Guild.Service/NexTalk.Guild.Service.csproj
          - name: messaging-service
            project: src/messaging-service/NexTalk.Messaging.Service/NexTalk.Messaging.Service.csproj
          - name: voice-service
            project: src/voice-service/NexTalk.Voice.Service/NexTalk.Voice.Service.csproj
          - name: websocket-gateway
            project: src/websocket-gateway/NextTalk.Websocket.Gateway/NextTalk.Websocket.Gateway.csproj

    name: Build ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore ${{ matrix.project }}

      - name: Build
        run: dotnet build ${{ matrix.project }} -c Release --no-restore

  # Docker build & push (only on target branches)
  docker:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - name: guild-service
            context: src/guild-service
            image: guild-service
          - name: messaging-service
            context: src/messaging-service
            image: messaging-service
          - name: voice-service
            context: src/voice-service
            image: voice-service
          - name: websocket-gateway
            context: src/websocket-gateway
            image: websocket-gateway

    name: Docker ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
