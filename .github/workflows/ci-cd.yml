name: CI / CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/nextalk

jobs:
  # Определяем, что изменилось, чтобы не гонять лишние джобы
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'src/guild-service/**'
              - 'src/messaging-service/**'
              - 'src/voice-service/**'
              - 'src/websocket-gateway/**'
              - '.github/workflows/**'
            frontend:
              - 'src/web/**'
              - '.github/workflows/**'

  # Build (only when backend changed)
  build-backend-services:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: guild-service
            project: src/guild-service/NexTalk.Guild.Service/NexTalk.Guild.Service.csproj
          - name: messaging-service
            project: src/messaging-service/NexTalk.Messaging.Service/NexTalk.Messaging.Service.csproj
          - name: voice-service
            project: src/voice-service/NexTalk.Voice.Service/NexTalk.Voice.Service.csproj
          - name: websocket-gateway
            project: src/websocket-gateway/NextTalk.Websocket.Gateway/NextTalk.Websocket.Gateway.csproj

    name: Build ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore ${{ matrix.project }}

      - name: Build
        run: dotnet build ${{ matrix.project }} -c Release --no-restore

  # Test (only when backend changed)
  test-backend-services:
    needs: [changes, build-backend-services]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: guild-service
            solution: src/guild-service/NexTalk.Guild.Service.Tests/NexTalk.Guild.Service.Tests.csproj
          - name: messaging-service
            solution: src/messaging-service/NexTalk.Messaging.Service.Tests/NexTalk.Messaging.Service.Tests.csproj
          - name: voice-service
            solution: src/voice-service/NexTalk.Voice.Service.Tests/NexTalk.Voice.Service.Tests.csproj
          - name: websocket-gateway
            solution: src/websocket-gateway/NextTalk.Websocket.Gateway.Tests/NextTalk.Websocket.Gateway.Tests.csproj

    name: Test ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore ${{ matrix.solution }}

      - name: Test
        run: >
          dotnet test ${{ matrix.solution }}
          -c Release --no-restore
          --logger "trx;LogFileName=test-results.trx"
          --logger "console;verbosity=normal"
          --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.name }}
          path: TestResults/**/*.trx
          if-no-files-found: ignore

  # Frontend CI (only when frontend changed)
  frontend-ci:
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    name: frontend lint & typecheck
    defaults:
      run:
        working-directory: src/web
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: src/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

  # Docker build & push: main и deploy-k3s-ha. Нужные джобы могут быть skipped — !failure() это учитывает.
  docker-build-push:
    needs: [changes, build-backend-services, test-backend-services, frontend-ci]
    if: >-
      !failure() && !cancelled() &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/deploy-k3s-ha') &&
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: guild-service
            context: src/guild-service
            image: guild-service
          - name: messaging-service
            context: src/messaging-service
            image: messaging-service
          - name: voice-service
            context: src/voice-service
            image: voice-service
          - name: websocket-gateway
            context: src/websocket-gateway
            image: websocket-gateway
          - name: web-spa
            context: src/web
            image: web-spa

    name: Docker ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_OIDC_CLIENT_ID=${{ secrets.VITE_OIDC_CLIENT_ID }}
            VITE_OIDC_AUTHORITY=https://nextalk.fun
            VITE_OIDC_REDIRECT_URI=https://nextalk.fun/callback
            VITE_WS_URL=wss://nextalk.fun/hubs
            VITE_LIVEKIT_URL=wss://nextalk.fun/livekit
            VITE_API_URL=https://nextalk.fun

  # Скан образов на известные CVE (OS пакеты + NuGet/npm deps).
  # Запускается только после push в main, не блокирует билд на старте
  # (exit-code: 0). Когда наберём корпус ignore'ов — поставить '1'.
  # Trivy DB ездит через OCI registry, кэшируется в GHA автоматически.
  trivy-scan:
    needs: [docker-build-push]
    if: >-
      !failure() && !cancelled() &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/deploy-k3s-ha')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: read

    strategy:
      fail-fast: false
      matrix:
        image: [guild-service, messaging-service, voice-service, websocket-gateway, web-spa]

    name: Trivy ${{ matrix.image }}
    steps:
      # Pin на v0.36.0 — после supply-chain компрометации марта 2026 теги
      # 0.0.1–0.34.2 (без v-префикса) признаны небезопасными. v0.35.0 был
      # единственным защищённым во время инцидента, v0.36.0 — текущий.
      # Доп. безопасность — пин на full commit SHA, см. advisory:
      # https://github.com/aquasecurity/trivy/security/advisories/GHSA-69fq-xp46-6x23
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:latest
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'
        env:
          TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db:2
          TRIVY_JAVA_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-java-db:1

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif
          category: trivy-${{ matrix.image }}
