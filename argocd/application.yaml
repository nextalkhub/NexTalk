apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nextalk
  namespace: argocd
spec:
  project: nextalk

  # Два source'а одного репозитория (multi-source, ArgoCD >= 2.6):
  #   1) Helm-чарт приложения. Секреты НЕ рендерятся - в values.yaml
  #      secrets.create=false, поэтому чувствительные значения не приходят
  #      из git в открытом виде.
  #   2) Зашифрованные секреты (SealedSecret). Контроллер sealed-secrets
  #      расшифрует их в Secret nextalk-secrets уже внутри кластера.
  sources:
    - repoURL: https://github.com/nextalkhub/NexTalk.git
      targetRevision: main
      path: charts/nextalk
      helm:
        releaseName: nextalk
    - repoURL: https://github.com/nextalkhub/NexTalk.git
      targetRevision: main
      path: argocd/sealed

  destination:
    server: https://kubernetes.default.svc
    namespace: nextalk

  syncPolicy:
    automated:
      prune: true       # удалять ресурсы, убранные из чарта
      selfHeal: true    # откатывать ручные правки в кластере
    syncOptions:
      # namespace создает сам чарт (templates/namespace.yaml с PSA-меткой
      # privileged), поэтому CreateNamespace здесь не нужен.
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
