apiVersion: v1
kind: ConfigMap
metadata:
  name: nextalk-config
  namespace: {{ .Values.namespace }}
data:
  ASPNETCORE_ENVIRONMENT: Production
  ZITADEL_DOMAIN: {{ .Values.zitadel.domain | quote }}
  ZITADEL_EXTERNALPORT: {{ .Values.zitadel.externalPort | quote }}
  ZITADEL_PUBLIC_SCHEME: {{ if .Values.tls.enabled }}https{{ else }}http{{ end }}
  ZITADEL_EXTERNALSECURE: {{ if .Values.tls.enabled }}"true"{{ else }}"false"{{ end }}
  ZITADEL_AUTHORITY: {{ if .Values.tls.enabled }}https{{ else }}http{{ end }}://{{ .Values.domain }}
  ZITADEL_ACCESS_LOG_STDOUT_ENABLED: "true"
  LOGIN_CLIENT_PAT_EXPIRATION: "2099-12-31T23:59:59Z"
