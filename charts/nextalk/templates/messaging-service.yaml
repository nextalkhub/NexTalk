---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: messaging-service
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.messagingService.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: messaging-service
  template:
    metadata:
      labels:
        app: messaging-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5002"
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: messaging-service
          image: "{{ .Values.messagingService.image.repository }}:{{ .Values.messagingService.image.tag }}"
          imagePullPolicy: {{ .Values.messagingService.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - containerPort: 5002
          env:
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: nextalk-config
                  key: ASPNETCORE_ENVIRONMENT
            - name: ASPNETCORE_URLS
              value: http://+:5002
            - name: ConnectionStrings__PostgresConnection
              valueFrom:
                secretKeyRef:
                  name: nextalk-secrets
                  key: postgres-dsn-nextalk
            - name: Zitadel__Authority
              valueFrom:
                configMapKeyRef:
                  name: nextalk-config
                  key: ZITADEL_AUTHORITY
            - name: Zitadel__MetadataAddress
              value: http://zitadel:8080/.well-known/openid-configuration
            - name: Services__WebSocketGateway
              value: http://websocket-gateway:5004
            - name: Services__GuildService
              value: http://guild-service:5001
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.otelEndpoint }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: grpc
          startupProbe:
            httpGet:
              path: /healthz
              port: 5002
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: 5002
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5002
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

---
apiVersion: v1
kind: Service
metadata:
  name: messaging-service
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: messaging-service
  ports:
    - port: 5002
      targetPort: 5002
