---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: guild-service
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.guildService.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: guild-service
  template:
    metadata:
      labels:
        app: guild-service
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: guild-service
          image: "{{ .Values.guildService.image.repository }}:{{ .Values.guildService.image.tag }}"
          imagePullPolicy: {{ .Values.guildService.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - containerPort: 5001
          env:
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: nextalk-config
                  key: ASPNETCORE_ENVIRONMENT
            - name: ASPNETCORE_URLS
              value: http://+:5001
            - name: ConnectionStrings__PostgresConnection
              valueFrom:
                secretKeyRef:
                  name: nextalk-secrets
                  key: postgres-dsn-nextalk
            # Redis password не уезжает в plain env — собираем строку через $(VAR).
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nextalk-secrets
                  key: redis-password
            - name: ConnectionStrings__Redis
              value: {{ printf "%s:%s,password=$(REDIS_PASSWORD),defaultDatabase=1" (required "db.redisHost обязателен" .Values.db.redisHost) .Values.db.redisPort | quote }}
            - name: Zitadel__Authority
              valueFrom:
                configMapKeyRef:
                  name: nextalk-config
                  key: ZITADEL_AUTHORITY
            - name: Zitadel__MetadataAddress
              value: http://zitadel:8080/.well-known/openid-configuration
            - name: Services__WebSocketGateway
              value: http://websocket-gateway:5004
            - name: Services__VoiceService
              value: http://voice-service:5003
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.otelEndpoint }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: grpc
          startupProbe:
            httpGet:
              path: /healthz
              port: 5001
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: 5001
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5001
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

---
apiVersion: v1
kind: Service
metadata:
  name: guild-service
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: guild-service
  ports:
    - port: 5001
      targetPort: 5001
