{{- if .Values.otelCollector.enabled }}
---
# OpenTelemetry Collector с tail-sampling.
# Сервисы шлют 100% трейсов сюда (в кластер), коллектор решает что оставить:
# все ошибки + все медленные (>1s) + 10% остального, и только это уезжает в Tempo.
# Так obs-vps не захлёбывается телеметрией под нагрузкой, а важные трейсы не теряются.
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: {{ .Values.namespace }}
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      # Решение принимается через decision_wait после старта трейса, когда собраны
      # все спаны. Политики проверяются сверху вниз, трейс оставляется при первом
      # совпадении.
      tail_sampling:
        decision_wait: 10s
        num_traces: 50000
        expected_new_traces_per_sec: {{ .Values.otelCollector.expectedTracesPerSec }}
        policies:
          - name: keep-errors
            type: status_code
            status_code:
              status_codes: [ERROR]
          - name: keep-slow
            type: latency
            latency:
              threshold_ms: {{ .Values.otelCollector.slowThresholdMs }}
          - name: sample-rest
            type: probabilistic
            probabilistic:
              sampling_percentage: {{ .Values.otelCollector.sampleRestPercent }}
      batch:
        send_batch_size: 512
        timeout: 5s

    exporters:
      otlp/tempo:
        endpoint: {{ .Values.observability.tempoOtlpEndpoint }}
        tls:
          insecure: true

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [tail_sampling, batch]
          exporters: [otlp/tempo]

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: otel-collector
          image: "{{ .Values.otelCollector.image.repository }}:{{ .Values.otelCollector.image.tag }}"
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          args: ["--config=/etc/otelcol/config.yaml"]
          ports:
            - containerPort: 4317
            - containerPort: 4318
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol/config.yaml
              subPath: config.yaml
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: otel-collector-config

---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: otel-collector
  ports:
    - name: grpc
      port: 4317
      targetPort: 4317
    - name: http
      port: 4318
      targetPort: 4318
{{- end }}
