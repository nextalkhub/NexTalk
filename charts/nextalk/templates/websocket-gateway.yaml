---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: websocket-gateway
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.websocketGateway.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: websocket-gateway
  template:
    metadata:
      labels:
        app: websocket-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5004"
    spec:
      # Даем SignalR-клиентам время заметить разрыв и переподключиться к другому поду.
      terminationGracePeriodSeconds: 60
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: websocket-gateway
          image: "{{ .Values.websocketGateway.image.repository }}:{{ .Values.imageTag }}"
          imagePullPolicy: {{ .Values.websocketGateway.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - containerPort: 5004
          env:
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: nextalk-config
                  key: ASPNETCORE_ENVIRONMENT
            - name: ASPNETCORE_URLS
              value: http://+:5004
            - name: Zitadel__Authority
              valueFrom:
                configMapKeyRef:
                  name: nextalk-config
                  key: ZITADEL_AUTHORITY
            - name: Zitadel__MetadataAddress
              value: http://zitadel:8080/.well-known/openid-configuration
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nextalk-secrets
                  key: redis-password
            - name: ConnectionStrings__Redis
              value: {{ printf "%s:%s,password=$(REDIS_PASSWORD),defaultDatabase=2" (required "db.redisHost обязателен" .Values.db.redisHost) .Values.db.redisPort | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.otelEndpoint }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: grpc
            - name: Services__GuildService
              value: http://guild-service:5001
            - name: Services__MessagingService
              value: http://messaging-service:5002
            - name: Presence__HeartbeatInterval
              value: "20"
            - name: Presence__OfflineTimeout
              value: "30"
          startupProbe:
            httpGet:
              path: /healthz
              port: 5004
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: 5004
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5004
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

---
apiVersion: v1
kind: Service
metadata:
  name: websocket-gateway
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: websocket-gateway
  ports:
    - port: 5004
      targetPort: 5004
