---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-spa
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.webSpa.replicas }}
  selector:
    matchLabels:
      app: web-spa
  template:
    metadata:
      labels:
        app: web-spa
    spec:
      securityContext:
        # nginx-образ запускается под UID 101 (nginx). Подменяем стандартный 1000.
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web-spa
          image: "{{ .Values.webSpa.image.repository }}:{{ .Values.webSpa.image.tag }}"
          imagePullPolicy: {{ .Values.webSpa.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: web-spa
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: web-spa
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
