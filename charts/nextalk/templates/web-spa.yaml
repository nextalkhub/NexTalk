---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-spa
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.webSpa.replicas }}
  selector:
    matchLabels:
      app: web-spa
  template:
    metadata:
      labels:
        app: web-spa
    spec:
      containers:
        - name: web-spa
          image: {{ .Values.webSpa.image }}
          imagePullPolicy: {{ .Values.webSpa.imagePullPolicy }}
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: web-spa
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: web-spa
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
