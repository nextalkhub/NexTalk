apiVersion: v1
kind: Secret
metadata:
  name: nextalk-secrets
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  # required-валидация: helm install упадёт, если значение не задано.
  postgres-password: {{ required "postgres.password обязателен (подкатить из vault)" .Values.postgres.password | quote }}
  postgres-user: {{ .Values.postgres.user | quote }}
  postgres-db: {{ .Values.postgres.db | quote }}
  # Npgsql (.NET) DSN. SSL Mode маппится с .Values.db.sslmode: prefer/require/disable.
  # Npgsql принимает значения в TitleCase (Prefer/Require/Disable) — переводим через `title`.
  # Trust Server Certificate=true — серверный сертификат пока self-signed.
  postgres-dsn-nextalk: {{ printf "Host=%s;Port=%s;Database=%s;Username=%s;Password=%s;SSL Mode=%s;Trust Server Certificate=true" (required "db.host обязателен" .Values.db.host) .Values.db.port .Values.postgres.db .Values.postgres.user .Values.postgres.password (.Values.db.sslmode | title) | quote }}
  # Zitadel ожидает libpq-style DSN.
  postgres-dsn-zitadel: {{ printf "postgres://%s:%s@%s:%s/zitadel?sslmode=%s" .Values.postgres.user (.Values.postgres.password | urlquery) .Values.db.host .Values.db.port .Values.db.sslmode | quote }}
  redis-password: {{ required "db.redisPassword обязателен" .Values.db.redisPassword | quote }}
  livekit-api-key: {{ required "livekit.apiKey обязателен" .Values.livekit.apiKey | quote }}
  livekit-secret-key: {{ required "livekit.secretKey обязателен" .Values.livekit.secretKey | quote }}
  livekit-config.yaml: |
    port: 7880
    log_level: info

    rtc:
      tcp_port: 7881
      port_range_start: {{ .Values.livekit.rtcPortStart }}
      port_range_end: {{ .Values.livekit.rtcPortEnd }}
      use_external_ip: true

    redis:
      address: {{ printf "%s:%s" (required "db.redisHost обязателен" .Values.db.redisHost) .Values.db.redisPort | quote }}
      password: {{ .Values.db.redisPassword | quote }}
      db: {{ .Values.livekit.redisDb }}

    keys:
      {{ required "livekit.apiKey обязателен" .Values.livekit.apiKey }}: {{ required "livekit.secretKey обязателен" .Values.livekit.secretKey }}

    room:
      auto_create: true
      empty_timeout: 300
  zitadel-masterkey: {{ required "zitadel.masterkey обязателен (ровно 32 символа)" .Values.zitadel.masterkey | quote }}
