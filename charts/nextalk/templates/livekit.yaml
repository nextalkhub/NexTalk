---
# Конфиг LiveKit подтягивает Redis address и keys из env через ${...}.
# Это значит ключи остаются только в Secret nextalk-secrets, не утекают в ConfigMap.
# Документация: https://docs.livekit.io/home/self-hosting/deployment/
apiVersion: v1
kind: ConfigMap
metadata:
  name: livekit-config
  namespace: {{ .Values.namespace }}
data:
  livekit.yaml: |
    port: 7880
    log_level: info

    rtc:
      tcp_port: 7881
      port_range_start: {{ .Values.livekit.rtcPortStart }}
      port_range_end: {{ .Values.livekit.rtcPortEnd }}
      use_external_ip: true

    redis:
      address: {{ printf "%s:%s" (required "db.redisHost обязателен" .Values.db.redisHost) .Values.db.redisPort | quote }}
      password: ${REDIS_PASSWORD}
      db: {{ .Values.livekit.redisDb }}

    keys:
      ${LIVEKIT_KEYS}

    room:
      auto_create: true
      empty_timeout: 300

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: livekit
  namespace: {{ .Values.namespace }}
spec:
  # LiveKit в single-node режиме. Для HA нужен LiveKit Cloud / mesh с
  # одной точкой входа — это вне scope текущей итерации.
  replicas: 1
  selector:
    matchLabels:
      app: livekit
  template:
    metadata:
      labels:
        app: livekit
    spec:
      enableServiceLinks: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: livekit
          image: "{{ .Values.livekit.image.repository }}:{{ .Values.livekit.image.tag }}"
          args: ["--config", "/etc/livekit.yaml"]
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nextalk-secrets
                  key: redis-password
            - name: LIVEKIT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nextalk-secrets
                  key: livekit-api-key
            - name: LIVEKIT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: nextalk-secrets
                  key: livekit-secret-key
            # LIVEKIT_API_KEY и LIVEKIT_SECRET_KEY должны быть выше —
            # k8s подставляет $(VAR) только из переменных выше по списку.
            - name: LIVEKIT_KEYS
              value: "$(LIVEKIT_API_KEY): $(LIVEKIT_SECRET_KEY)"
          ports:
            - containerPort: 7880
              name: http
            - containerPort: 7881
              name: rtc-tcp
              protocol: TCP
            # UDP-диапазон для медиа. hostPort = portmap прямо на ноду
            # (под должен быть на ноде с публичным IP — pin через nodeSelector).
            - containerPort: {{ .Values.livekit.rtcPortStart }}
              hostPort: {{ .Values.livekit.rtcPortStart }}
              protocol: UDP
            - containerPort: {{ .Values.livekit.rtcPortEnd }}
              hostPort: {{ .Values.livekit.rtcPortEnd }}
              protocol: UDP
          volumeMounts:
            - name: config
              mountPath: /etc/livekit.yaml
              subPath: livekit.yaml
          readinessProbe:
            httpGet:
              path: /
              port: 7880
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 7880
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: livekit-config

---
apiVersion: v1
kind: Service
metadata:
  name: livekit
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: livekit
  ports:
    - name: http
      port: 7880
      targetPort: 7880
    - name: rtc-tcp
      port: 7881
      targetPort: 7881
      protocol: TCP
  type: ClusterIP
