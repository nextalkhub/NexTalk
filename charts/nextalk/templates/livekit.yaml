---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: livekit
  namespace: {{ .Values.namespace }}
spec:
  # LiveKit в single-node режиме. Для HA нужен LiveKit Cloud / mesh с
  # одной точкой входа — это вне scope текущей итерации.
  replicas: 1
  selector:
    matchLabels:
      app: livekit
  template:
    metadata:
      labels:
        app: livekit
    spec:
      enableServiceLinks: false
      # hostNetwork=true: pod биндится напрямую на сетевой стек ноды.
      # Обязательно для LiveKit на Kubernetes — оверлейная сеть (Flannel)
      # добавляет NAT-слои, ломающие WebRTC ICE.
      hostNetwork: true
      # Default = нода's /etc/resolv.conf. LiveKit не нужен cluster DNS —
      # Redis подключается по IP, STUN нужен только внешний резолв.
      dnsPolicy: Default
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: livekit
          image: "{{ .Values.livekit.image.repository }}:{{ .Values.livekit.image.tag }}"
          args: ["--config", "/etc/livekit.yaml"]
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - containerPort: 7880
              protocol: TCP
              name: http
            - containerPort: 7881
              protocol: TCP
              name: rtc-tcp
            - containerPort: {{ .Values.livekit.rtcUdpPort }}
              protocol: UDP
              name: rtc-udp
            - containerPort: 6789
              protocol: TCP
              name: metrics
          volumeMounts:
            - name: config
              mountPath: /etc/livekit.yaml
              subPath: livekit-config.yaml
          readinessProbe:
            httpGet:
              path: /
              port: 7880
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 7880
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: config
          secret:
            secretName: nextalk-secrets

---
apiVersion: v1
kind: Service
metadata:
  name: livekit
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: livekit
  ports:
    - name: http
      port: 7880
      targetPort: 7880
    - name: rtc-tcp
      port: 7881
      targetPort: 7881
      protocol: TCP
    - name: metrics
      port: 6789
      targetPort: 6789
  type: ClusterIP
