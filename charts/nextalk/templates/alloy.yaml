---
# ServiceAccount для доступа к Kubernetes API
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alloy
  namespace: {{ .Values.namespace }}

---
# ClusterRole: чтение метаданных подов и стриминг логов
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: alloy-nextalk
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "pods", "namespaces", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: alloy-nextalk
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: alloy-nextalk
subjects:
  - kind: ServiceAccount
    name: alloy
    namespace: {{ .Values.namespace }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: {{ .Values.namespace }}
data:
  config.alloy: |
{{ tpl (.Files.Get "files/alloy-k8s.alloy") . | indent 4 }}

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: alloy
  namespace: {{ .Values.namespace }}
spec:
  selector:
    matchLabels:
      app: alloy
  template:
    metadata:
      labels:
        app: alloy
    spec:
      serviceAccountName: alloy
      securityContext:
        runAsNonRoot: true
        runAsUser: 473
        runAsGroup: 473
        fsGroup: 473
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: alloy
          image: "{{ .Values.alloy.image.repository }}:{{ .Values.alloy.image.tag }}"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          args: ["run", "/etc/alloy/config.alloy"]
          env:
            # HOSTNAME = имя k8s-ноды, используется в relabel для фильтрации
            # подов текущей ноды и предотвращения дублирования логов.
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: config
              mountPath: /etc/alloy/config.alloy
              subPath: config.alloy
            # readOnlyRootFilesystem: true — нужны writable пути для WAL и tmp.
            - name: data
              mountPath: /var/lib/alloy/data
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 12345
            initialDelaySeconds: 10
            periodSeconds: 10
      tolerations:
        # Запускать и на control-plane нодах k3s
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      volumes:
        - name: config
          configMap:
            name: alloy-config
        - name: data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
