---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: voice-service
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.voiceService.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: voice-service
  template:
    metadata:
      labels:
        app: voice-service
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: voice-service
          image: "{{ .Values.voiceService.image.repository }}:{{ .Values.voiceService.image.tag }}"
          imagePullPolicy: {{ .Values.voiceService.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - containerPort: 5003
          env:
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: nextalk-config
                  key: ASPNETCORE_ENVIRONMENT
            - name: ASPNETCORE_URLS
              value: http://+:5003
            - name: Zitadel__Authority
              valueFrom:
                configMapKeyRef:
                  name: nextalk-config
                  key: ZITADEL_AUTHORITY
            - name: Zitadel__MetadataAddress
              value: http://zitadel:8080/.well-known/openid-configuration
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.otelEndpoint }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: grpc
            # LiveKit:Url — внутренний HTTP для admin API (RoomServiceClient, health check).
            - name: LiveKit__Url
              value: http://livekit:7880
            # LiveKit:PublicUrl — возвращается клиенту для WebSocket-подключения к SFU.
            - name: LiveKit__PublicUrl
              value: wss://{{ .Values.domain }}/livekit
            - name: LiveKit__ApiKey
              valueFrom:
                secretKeyRef:
                  name: nextalk-secrets
                  key: livekit-api-key
            - name: LiveKit__SecretKey
              valueFrom:
                secretKeyRef:
                  name: nextalk-secrets
                  key: livekit-secret-key
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nextalk-secrets
                  key: redis-password
            - name: ConnectionStrings__Redis
              value: {{ printf "%s:%s,password=$(REDIS_PASSWORD),defaultDatabase=3" (required "db.redisHost обязателен" .Values.db.redisHost) .Values.db.redisPort | quote }}
            - name: Services__GuildService
              value: http://guild-service:5001
            - name: Services__WebSocketGateway
              value: http://websocket-gateway:5004
          startupProbe:
            httpGet:
              path: /healthz
              port: 5003
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: 5003
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5003
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

---
apiVersion: v1
kind: Service
metadata:
  name: voice-service
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: voice-service
  ports:
    - port: 5003
      targetPort: 5003
