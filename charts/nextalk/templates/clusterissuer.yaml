{{- if .Values.tls.enabled }}
---
# Let's Encrypt staging — для первоначального тестирования.
# Выдаёт untrusted-сертификат, но не имеет rate limits prod-окружения.
# После успешной проверки переключить issuer на letsencrypt-prod.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: {{ required "tls.email обязателен (Let's Encrypt откажет в регистрации ACME-аккаунта без email)" .Values.tls.email }}
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
---
# Let's Encrypt production — trusted CA.
# Rate limit: 5 сертификатов на домен в неделю.
# Не использовать для тестирования.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: {{ required "tls.email обязателен (Let's Encrypt откажет в регистрации ACME-аккаунта без email)" .Values.tls.email }}
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
{{- end }}
