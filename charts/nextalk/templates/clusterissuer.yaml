{{- if and .Values.tls.enabled (eq .Values.tls.provider "letsencrypt") }}
---
# Let's Encrypt staging — для первоначального тестирования.
# Выдаёт untrusted-сертификат, но не имеет rate limits prod-окружения.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: {{ required "tls.email обязателен для provider: letsencrypt" .Values.tls.email }}
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
---
# Let's Encrypt production — trusted CA.
# Rate limit: 5 сертификатов на домен в неделю.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: {{ required "tls.email обязателен для provider: letsencrypt" .Values.tls.email }}
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
{{- end }}
