---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nextalk
  namespace: {{ .Values.namespace }}
  annotations:
    {{- if .Values.tls.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.tls.issuer | quote }}
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    {{- else }}
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    {{- end }}
    # WebSocket / long-poll: окно жизни соединения.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # Zitadel ждёт gRPC-Web заголовки и большие cookies в HTTP/2.
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
spec:
  ingressClassName: nginx
  {{- if .Values.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.domain }}
      secretName: nextalk-tls
  {{- end }}
  rules:
    - host: {{ .Values.domain }}
      http:
        paths:
          # ---- NexTalk API ----
          - path: /api/guilds
            pathType: Prefix
            backend:
              service:
                name: guild-service
                port:
                  number: 5001
          - path: /api/invites
            pathType: Prefix
            backend:
              service:
                name: guild-service
                port:
                  number: 5001
          - path: /api/channels
            pathType: Prefix
            backend:
              service:
                name: messaging-service
                port:
                  number: 5002
          - path: /api/messages
            pathType: Prefix
            backend:
              service:
                name: messaging-service
                port:
                  number: 5002
          - path: /api/voice
            pathType: Prefix
            backend:
              service:
                name: voice-service
                port:
                  number: 5003
          # ---- WebSocket ----
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: websocket-gateway
                port:
                  number: 5004
          # ---- Zitadel: OIDC API на 8080 (discovery, oauth2, token, userinfo) ----
          - path: /.well-known
            pathType: Prefix
            backend:
              service:
                name: zitadel
                port:
                  number: 8080
          - path: /oauth/v2
            pathType: Prefix
            backend:
              service:
                name: zitadel
                port:
                  number: 8080
          - path: /openid
            pathType: Prefix
            backend:
              service:
                name: zitadel
                port:
                  number: 8080
          - path: /oidc/v1
            pathType: Prefix
            backend:
              service:
                name: zitadel
                port:
                  number: 8080
          # Zitadel UI / Console / assets — отдельные пути, чтобы не задеть SPA.
          - path: /ui
            pathType: Prefix
            backend:
              service:
                name: zitadel
                port:
                  number: 8080
          - path: /assets
            pathType: Prefix
            backend:
              service:
                name: zitadel
                port:
                  number: 8080
          # ---- Zitadel login UI (port 3000) ----
          - path: /ui/v2/login
            pathType: Prefix
            backend:
              service:
                name: zitadel
                port:
                  number: 3000
          # ---- Web SPA: catch-all ----
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-spa
                port:
                  number: 80
