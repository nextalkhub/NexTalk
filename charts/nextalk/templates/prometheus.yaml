---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: {{ .Values.namespace }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-{{ .Values.namespace }}
rules:
  - apiGroups: [""]
    resources: [pods, endpoints, nodes]
    verbs: [get, list, watch]
  - nonResourceURLs: [/metrics]
    verbs: [get]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-{{ .Values.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-{{ .Values.namespace }}
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: {{ .Values.namespace }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: {{ .Values.namespace }}
data:
  prometheus.yml: |
    global:
      scrape_interval:     15s
      evaluation_interval: 15s

      external_labels:
        environment: production
        project:     nextalk
        cluster:     k3s

    remote_write:
      - url: {{ .Values.observability.prometheusRemoteWriteUrl }}
        queue_config:
          max_shards: 5
          max_samples_per_send: 1000
          batch_send_deadline: 5s
        metadata_config:
          send_interval: 1m

    scrape_configs:

      - job_name: guild-service
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["{{ .Values.namespace }}"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: guild-service
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: "$1:5001"
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - target_label: service
            replacement: guild-service
        metrics_path: /metrics

      - job_name: messaging-service
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["{{ .Values.namespace }}"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: messaging-service
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: "$1:5002"
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - target_label: service
            replacement: messaging-service
        metrics_path: /metrics

      - job_name: voice-service
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["{{ .Values.namespace }}"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: voice-service
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: "$1:5003"
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - target_label: service
            replacement: voice-service
        metrics_path: /metrics

      - job_name: websocket-gateway
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["{{ .Values.namespace }}"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: websocket-gateway
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: "$1:5004"
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - target_label: service
            replacement: websocket-gateway
        metrics_path: /metrics

      - job_name: zitadel
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["{{ .Values.namespace }}"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: zitadel
          - source_labels: [__meta_kubernetes_pod_container_name]
            action: keep
            regex: api
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: "$1:8080"
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - target_label: service
            replacement: zitadel
        metrics_path: /debug/metrics

      - job_name: livekit
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["{{ .Values.namespace }}"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: livekit
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: "$1:6789"
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - target_label: service
            replacement: livekit
        metrics_path: /metrics

      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: {{ .Values.namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.prometheus.storage }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: prometheus
          image: "{{ .Values.prometheus.image.repository }}:{{ .Values.prometheus.image.tag }}"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time={{ .Values.prometheus.retention }}
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: data
              mountPath: /prometheus
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
