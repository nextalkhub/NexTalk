---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: {{ .Values.namespace }}
data:
  prometheus.yml: |
    global:
      scrape_interval:     15s
      evaluation_interval: 15s

      external_labels:
        environment: production
        project:     nextalk
        cluster:     k3s

    # Метрики отправляются на Obs VPS Prometheus через приватную сеть Beget.
    # Obs VPS Prometheus запущен с --web.enable-remote-write-receiver.
    remote_write:
      - url: {{ .Values.observability.prometheusRemoteWriteUrl }}
        queue_config:
          max_shards: 5
          max_samples_per_send: 1000
          batch_send_deadline: 5s
        metadata_config:
          send_interval: 1m

    scrape_configs:

      - job_name: guild-service
        static_configs:
          - targets: ["guild-service:5001"]
            labels:
              service: guild-service
        metrics_path: /metrics

      - job_name: messaging-service
        static_configs:
          - targets: ["messaging-service:5002"]
            labels:
              service: messaging-service
        metrics_path: /metrics

      - job_name: voice-service
        static_configs:
          - targets: ["voice-service:5003"]
            labels:
              service: voice-service
        metrics_path: /metrics

      - job_name: websocket-gateway
        static_configs:
          - targets: ["websocket-gateway:5004"]
            labels:
              service: websocket-gateway
        metrics_path: /metrics

      - job_name: zitadel
        static_configs:
          - targets: ["zitadel:8080"]
            labels:
              service: zitadel
        metrics_path: /debug/metrics

      - job_name: livekit
        static_configs:
          - targets: ["livekit:6789"]
            labels:
              service: livekit
        metrics_path: /metrics

      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: {{ .Values.namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.prometheus.storage }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: prometheus
          image: "{{ .Values.prometheus.image.repository }}:{{ .Values.prometheus.image.tag }}"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            # Короткий retention: долгосрочное хранение — на Obs VPS через remote_write.
            - --storage.tsdb.retention.time={{ .Values.prometheus.retention }}
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: data
              mountPath: /prometheus
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
