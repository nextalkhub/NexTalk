---
# RBAC: Prometheus читает метаданные подов из k8s API для kubernetes_sd_configs.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: {{ .Values.namespace }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-nextalk
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods", "services", "endpoints", "namespaces"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-nextalk
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-nextalk
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: {{ .Values.namespace }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: {{ .Values.namespace }}
data:
  prometheus.yml: |
    global:
      scrape_interval:     15s
      evaluation_interval: 15s

      external_labels:
        environment: production
        project:     nextalk
        cluster:     k3s

    # Метрики отправляются на Obs VPS Prometheus через приватную сеть Beget.
    # Obs VPS Prometheus запущен с --web.enable-remote-write-receiver.
    remote_write:
      - url: {{ .Values.observability.prometheusRemoteWriteUrl }}
        queue_config:
          max_shards: 5
          max_samples_per_send: 1000
          batch_send_deadline: 5s
        metadata_config:
          send_interval: 1m

    scrape_configs:

      # NexTalk pods - kubernetes_sd_configs скрейпит каждый под отдельно по pod IP.
      # Это решает проблему multi-replica: при 2+ репликах static_configs через Service
      # попадает случайно на один под за scrape, kubernetes_sd гарантирует все поды.
      # Под должен иметь аннотации: prometheus.io/scrape="true", prometheus.io/port.
      # prometheus.io/path опционален (по умолчанию /metrics).
      - job_name: nextalk-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [{{ .Values.namespace }}]
        relabel_configs:
          # Скрейпить только помеченные аннотацией поды
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          # Адрес = pod IP + порт из аннотации
          - source_labels: [__meta_kubernetes_pod_ip, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: (.+);(\d+)
            replacement: $1:$2
            target_label: __address__
          # Путь из аннотации (если задан - overrides /metrics)
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          # job = значение label app (guild-service, messaging-service, …)
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: job
          # Добавляем pod и namespace для удобства дебага
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace

      # Zitadel - единственная реплика, нестандартный путь /debug/metrics
      - job_name: zitadel
        static_configs:
          - targets: ["zitadel:8080"]
            labels:
              service: zitadel
        metrics_path: /debug/metrics

      # LiveKit - hostNetwork=true, pod IP = node IP; static_config через Service ClusterIP
      - job_name: livekit
        static_configs:
          - targets: ["livekit:6789"]
            labels:
              service: livekit

      # Prometheus self-monitoring
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: {{ .Values.namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.prometheus.storage }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: prometheus
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: prometheus
          image: "{{ .Values.prometheus.image.repository }}:{{ .Values.prometheus.image.tag }}"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            # Короткий retention: долгосрочное хранение - на Obs VPS через remote_write.
            - --storage.tsdb.retention.time={{ .Values.prometheus.retention }}
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: data
              mountPath: /prometheus
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
