# =======================================================================
# NexTalk Helm chart values.
#
# Файл НЕ содержит секретов. Пароли, masterkey и livekit-ключи приходят из
# SealedSecret (argocd/sealed/), который собирает `make seal` из ansible-vault.
# Не-секретный prod-конфиг (domain, db.host, imageTag) живет прямо здесь -
# это источник правды для ArgoCD. См. docs/gitops-argocd.md.
#
# Перед деплоем должны быть переопределены:
#   db.host, db.redisHost           - приватные IP db-vps
#   tls.email                       - email для Let's Encrypt
#   postgres.password               - из vault.yml
#   db.redisPassword                - из vault.yml
#   zitadel.masterkey               - из vault.yml (ровно 32 символа)
#   livekit.apiKey, secretKey       - из vault.yml
#   *Service.image.tag              - конкретная версия (semver или sha)
# =======================================================================

namespace: nextalk

# Внешний домен кластера. Используется в Ingress и Zitadel.
domain: "nextalk.fun"

# Общий тег образов пяти наших сервисов (guild/messaging/voice/ws/web).
# CI обновляет это поле на SHA коммита при пуше в main - ArgoCD подхватывает
# изменение из git. Все пять сервисов собираются из одного коммита, поэтому
# тег один на всех. Сторонние образы (zitadel, livekit) держат свои версии ниже.
imageTag: "4cd7a9b"

# Создавать ли Secret nextalk-secrets из values этого чарта.
#   false (по умолчанию, GitOps) - секрет приходит из SealedSecret в git,
#          ArgoCD не рендерит чувствительные значения из values.
#   true   - чарт сам создает Secret из values (нужно при сборке SealedSecret
#          через `helm template -s templates/secrets.yaml`, см. seal-secrets.yml).
secrets:
  create: false

# -----------------------------------------------------------------------
# Сеть. Один CIDR - используется в NetworkPolicy egress правилах
# для доступа к db-vps и obs-vps по приватной сети Beget.
# -----------------------------------------------------------------------
network:
  privateCidr: "10.0.0.0/8"
  # Service CIDR k3s-кластера. Kubernetes API доступен по ClusterIP 10.43.0.1:443.
  # Нужен Alloy для discovery.kubernetes. Должен совпадать с k3s_service_cidr в ansible/vars.yml.
  clusterServiceCidr: "10.43.0.0/16"

# -----------------------------------------------------------------------
# TLS
# -----------------------------------------------------------------------
tls:
  enabled: true
  # cloudflare - использует предсозданный Secret с CF Origin Certificate.
  #              ClusterIssuer не создается, cert-manager не нужен.
  # letsencrypt - создает ClusterIssuer, cert-manager управляет сертификатами.
  provider: "letsencrypt"
  # cert-manager создает этот Secret автоматически при provider: letsencrypt.
  # При provider: cloudflare - создать вручную:
  #   kubectl create secret tls cloudflare-origin-cert \
  #     --cert=cert.pem --key=key.pem -n nextalk
  secretName: "nextalk-tls"
  # --- Только для provider: letsencrypt ---
  issuer: "letsencrypt-prod"
  # Email для уведомлений Let's Encrypt о просрочке. Не секрет (попадает в
  # ClusterIssuer). В GitOps хранится прямо здесь, а не подкатывается Ansible.
  email: "korsakovdanil123@yandex.ru"

# -----------------------------------------------------------------------
# DB VPS (Beget приватная сеть)
# -----------------------------------------------------------------------
db:
  # Приватный IP db-vps (не секрет, RFC1918). В GitOps - источник правды здесь;
  # должен совпадать с ansible_host группы [db] в inventory/hosts.ini.
  host: "10.19.0.31"
  port: "5432"
  # sslmode для подключений к Postgres.
  # prefer - TLS если сервер поддерживает, иначе plain. БД в приватной сети
  # Beget без TLS пока (roadmap: настроить TLS на db-vps и переключить на require).
  sslmode: "prefer"
  redisHost: "10.19.0.31" # Тот же db-vps или отдельный
  redisPort: "6379"
  redisPassword: ""      # Секрет: приходит из SealedSecret, не из git в открытом виде

# -----------------------------------------------------------------------
# PostgreSQL credentials (хранятся в Secret nextalk-secrets)
# -----------------------------------------------------------------------
postgres:
  user: "nextalk_app"
  password: ""           # Подкатить через vault (vault_postgres_password)
  db: "nextalk"

# -----------------------------------------------------------------------
# Zitadel (OIDC identity provider)
# -----------------------------------------------------------------------
zitadel:
  domain: "nextalk.fun"
  externalPort: "443"
  # Ровно 32 символа. Подкатить через vault (openssl rand -hex 16).
  masterkey: ""
  image:
    repository: ghcr.io/zitadel/zitadel
    tag: "v4.13.1"
  loginImage:
    repository: ghcr.io/zitadel/zitadel-login
    tag: "v4.13.1"
  # Пока 1 реплика. HA требует разделить bootstrap (Job с start-from-init)
  # и runtime (StatefulSet с start без init) - отдельная итерация.
  replicas: 1

# -----------------------------------------------------------------------
# LiveKit (voice/video SFU)
# -----------------------------------------------------------------------
livekit:
  apiKey: ""             # Подкатить через vault
  secretKey: ""          # Подкатить через vault
  image:
    repository: livekit/livekit-server
    tag: "v1.11"
  # Единственный UDP-порт для медиа (UDPMux). Один порт = один hostPort DNAT-rule.
  # Диапазон не работает: k3s создает DNAT только для явно перечисленных портов,
  # а LiveKit выбирает случайный порт из диапазона - остальные недостижимы снаружи.
  rtcUdpPort: 7882
  # Redis для shared state (room metadata). База 0 - общая для LiveKit.
  redisDb: 0

# -----------------------------------------------------------------------
# Observability (Obs VPS, Beget приватная сеть)
# -----------------------------------------------------------------------
observability:
  # Сервисы шлют трейсы в in-cluster OTel Collector (tail-sampling), а не напрямую
  # в Tempo - иначе obs-vps захлёбывается под нагрузкой. Если otelCollector выключен,
  # верни сюда "http://10.19.0.41:4317", чтобы слать в Tempo напрямую.
  otelEndpoint: "http://otel-collector:4317"
  # Куда коллектор отдаёт отобранные трейсы (OTLP-приём Tempo на obs-vps).
  tempoOtlpEndpoint: "10.19.0.41:4317"
  lokiUrl: "http://10.19.0.41:3100"
  # Tempo HTTP API (для UI и query).
  tempoUrl: "http://10.19.0.41:3200"
  prometheusRemoteWriteUrl: "http://10.19.0.41:9090/api/v1/write"

# -----------------------------------------------------------------------
# OpenTelemetry Collector с tail-sampling: держит все ошибки + медленные,
# остальное прореживает. Разгружает obs-vps, не теряя важные трейсы.
# -----------------------------------------------------------------------
otelCollector:
  enabled: true
  image:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.123.0"   # tailsamplingprocessor есть только в contrib; тег сверить с актуальным
  slowThresholdMs: 1000       # трейсы дольше 1s оставляем целиком
  sampleRestPercent: 10       # из остального (быстрые, без ошибок) берём 10%
  expectedTracesPerSec: 500   # для аллокации памяти tail-sampling под пиковую нагрузку

# -----------------------------------------------------------------------
# In-cluster Prometheus (scrape + remote_write на Obs VPS)
# -----------------------------------------------------------------------
prometheus:
  image:
    repository: prom/prometheus
    tag: "v3.11.3"
  retention: "1d"
  storage: "2Gi"

# -----------------------------------------------------------------------
# Alloy (logs collector → Loki на Obs VPS)
# -----------------------------------------------------------------------
alloy:
  enabled: true
  image:
    repository: grafana/alloy
    tag: "v1.16.1"

# -----------------------------------------------------------------------
# Promtail (logs collector → Loki на Obs VPS)
# -----------------------------------------------------------------------
promtail:
  enabled: false
  image:
    repository: grafana/promtail
    tag: "3.6.1"

# -----------------------------------------------------------------------
# Дефолтный securityContext для всех сервисов NexTalk.
# Совместим с PSA baseline и почти со всем restricted (кроме seccomp).
# -----------------------------------------------------------------------
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false  # ASP.NET пишет временные файлы; включить позже с emptyDir для /tmp
  capabilities:
    drop: ["ALL"]

# -----------------------------------------------------------------------
# Application services. Теги фиксированы - никаких :latest в проде.
# Перед каждым деплоем обновлять tag вручную (или из CI).
# -----------------------------------------------------------------------
guildService:
  replicas: 2
  image:
    repository: "ghcr.io/nextalkhub/nextalk/guild-service"
    pullPolicy: IfNotPresent

messagingService:
  replicas: 2
  image:
    repository: "ghcr.io/nextalkhub/nextalk/messaging-service"
    pullPolicy: IfNotPresent

voiceService:
  replicas: 2
  image:
    repository: "ghcr.io/nextalkhub/nextalk/voice-service"
    pullPolicy: IfNotPresent

websocketGateway:
  replicas: 2
  image:
    repository: "ghcr.io/nextalkhub/nextalk/websocket-gateway"
    pullPolicy: IfNotPresent

webSpa:
  replicas: 2
  image:
    repository: "ghcr.io/nextalkhub/nextalk/web-spa"
    pullPolicy: IfNotPresent
