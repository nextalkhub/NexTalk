server:
  http_listen_port: 9080
  log_level: info

positions:
  filename: /run/promtail/positions.yaml

clients:
  - url: ${LOKI_URL}/loki/api/v1/push

scrape_configs:
  - job_name: nextalk-pods
    kubernetes_sd_configs:
      - role: pod
        selectors:
          - role: pod
            field: "spec.nodeName=${NODE_NAME}"

    relabel_configs:
      # Только namespace nextalk
      - source_labels: [__meta_kubernetes_namespace]
        action: keep
        regex: nextalk

      # Только поды с label app=<что-то>
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: .+

      # Путь к лог-файлу: /var/log/pods/<ns>_<pod>_<uid>/<container>/<n>.log
      - source_labels: [__meta_kubernetes_pod_uid, __meta_kubernetes_pod_container_name]
        separator: /
        target_label: __path__
        replacement: /var/log/pods/*$1/*.log

      # Метки потока Loki
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
      - source_labels: [__meta_kubernetes_pod_container_name]
        target_label: container
      - source_labels: [__meta_kubernetes_pod_label_app]
        target_label: app
      - source_labels: [__meta_kubernetes_pod_node_name]
        target_label: node

    pipeline_stages:
      # Парсинг формата CRI (containerd): timestamp stream flags log-line
      - cri: {}

      # Serilog CompactJSON: @l/@t — специальные символы, нужны JMESPath-кавычки
      - json:
          expressions:
            _level: '"@l"'
            _timestamp: '"@t"'
            _trace_id: TraceId
            _span_id: SpanId

      # Serilog опускает @l для Information — подставляем дефолт
      - template:
          source: _level
          template: '{{ if .Value }}{{ .Value }}{{ else }}Information{{ end }}'

      - labels:
          level: _level

      - structured_metadata:
          trace_id: _trace_id
          span_id: _span_id

      - timestamp:
          source: _timestamp
          format: RFC3339Nano
          fallback_formats:
            - "2006-01-02T15:04:05.9999999Z07:00"
            - RFC3339
          action_on_failure: skip
