# ─────────────────────────────────────────────────────────────────────────────
# Jaeger v2 — All-in-One (dev)
#
# Jaeger v2 построен на движке OTel Collector: receivers / exporters / pipelines.
# All-in-one = jaeger_storage (хранилище) + jaeger_query (UI + API) в одном процессе.
#
# Хранилище: in-memory (dev). При рестарте трейсы теряются.
# Для prod: заменить backend на badger (single-node) или elasticsearch (HA).
#
# Порты:
#   4317  — OTLP gRPC (принимает от otel-collector)
#   4318  — OTLP HTTP
#   16686 — Jaeger UI + Query HTTP API
#   13133 — Health check (healthcheckv2)
# ─────────────────────────────────────────────────────────────────────────────

extensions:

  # Health check — стандартный OTel-совместимый эндпоинт (/  → 200 OK когда готов).
  # Требует явного указания протокола (иначе: "must specify at least one protocol").
  healthcheckv2:
    use_v2: true
    http:
      endpoint: 0.0.0.0:13133

  # Хранилище трейсов: in-memory backend с именем "memstore".
  jaeger_storage:
    backends:
      memstore:
        memory:
          max_traces: 50000

  # Query-сервис: UI на 16686, читает из "memstore".
  jaeger_query:
    storage:
      traces: memstore
    http:
      endpoint: 0.0.0.0:16686
    grpc:
      endpoint: 0.0.0.0:16685

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 1024
    timeout: 5s

exporters:
  # Запись трейсов в backend "memstore".
  jaeger_storage_exporter:
    trace_storage: memstore

service:
  extensions: [healthcheckv2, jaeger_storage, jaeger_query]
  pipelines:
    traces:
      receivers:  [otlp]
      processors: [batch]
      exporters:  [jaeger_storage_exporter]
  telemetry:
    logs:
      level: warn
