apiVersion: 1

groups:
  - orgId: 1
    name: NexTalk
    folder: NexTalk
    interval: 1m
    rules:

      - uid: nextalk-service-down
        title: Service Down
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: up{job=~"guild-service|messaging-service|voice-service|websocket-gateway"}
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              refId: C
              conditions:
                - evaluator:
                    params: [1]
                    type: lt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
        noDataState: Alerting
        execErrState: Alerting
        for: 1m
        annotations:
          summary: "{{ $labels.job }} is down"
          description: "Prometheus scrape target {{ $labels.job }} returned up=0 for more than 1 minute."
        labels:
          severity: critical

      - uid: nextalk-high-error-rate
        title: High Error Rate
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: >
                sum(rate(http_requests_received_total{job=~"guild-service|messaging-service|voice-service|websocket-gateway",statusCode=~"5.."}[5m]))
                /
                sum(rate(http_requests_received_total{job=~"guild-service|messaging-service|voice-service|websocket-gateway"}[5m]))
                * 100
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              refId: C
              conditions:
                - evaluator:
                    params: [5]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
        noDataState: NoData
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "Error rate above 5%"
          description: "5xx error rate is {{ $values.A.Value | printf \"%.1f\" }}% over the last 5 minutes."
        labels:
          severity: warning

      - uid: nextalk-crashloop
        title: Pod CrashLoopBackOff
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: >
                kube_pod_container_status_waiting_reason{namespace="nextalk",reason="CrashLoopBackOff"} == 1
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              refId: C
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
        noDataState: NoData
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "{{ $labels.pod }} is in CrashLoopBackOff"
          description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} container {{ $labels.container }} is in CrashLoopBackOff."
        labels:
          severity: critical

      - uid: nextalk-cert-expiry
        title: TLS Certificate Expiring Soon
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: >
                (certmanager_certificate_expiration_timestamp_seconds{namespace="nextalk"} - time()) / 86400
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              refId: C
              conditions:
                - evaluator:
                    params: [7]
                    type: lt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
        noDataState: NoData
        execErrState: Alerting
        for: 0s
        annotations:
          summary: "Certificate {{ $labels.name }} expires in less than 7 days"
          description: "Certificate {{ $labels.namespace }}/{{ $labels.name }} expires in {{ $values.A.Value | printf \"%.0f\" }} days."
        labels:
          severity: warning

      - uid: nextalk-high-latency
        title: High P99 Latency
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: >
                histogram_quantile(0.99,
                  sum(rate(http_request_duration_seconds_bucket{job=~"guild-service|messaging-service|voice-service|websocket-gateway"}[5m]))
                  by (le)
                )
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              refId: C
              conditions:
                - evaluator:
                    params: [1.0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "P99 latency above 1s"
          description: "P99 request latency is {{ $values.A.Value | printf \"%.3f\" }}s over the last 5 minutes."
        labels:
          severity: warning
