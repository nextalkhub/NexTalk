# ─────────────────────────────────────────────────────────────────────────────
# Loki 3.x — Single Binary Mode (monolithic)
#
# Single binary запускает все компоненты (ingester, querier, distributor,
# compactor) в одном процессе. Подходит для dev и небольших нагрузок (< 20 GB/day).
# Хранение: filesystem в Docker volume loki-data.
# ─────────────────────────────────────────────────────────────────────────────

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

# common задаёт defaults для всех компонентов: путь хранилища, репликацию,
# кольцо координации (inmemory — для single binary без etcd/consul).
common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory:  /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

# TSDB — текущий рекомендованный индекс Loki 3.x (заменил boltdb-shipper).
# schema v13 — последняя стабильная схема.
schema_config:
  configs:
    - from: 2024-01-01
      store:        tsdb
      object_store: filesystem
      schema:       v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # Логи старше 7 дней отклонять (защита от случайного форварда старых данных).
  reject_old_samples:         true
  reject_old_samples_max_age: 168h
  # Retention 30 дней.
  retention_period: 720h
  # allow_structured_metadata нужен для OTel-нативных логов (Фаза 2).
  allow_structured_metadata: true

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled:     true
        max_size_mb: 128

# Явная конфигурация ingester ring устраняет "empty ring" в ratestore:
# distributor опрашивает ingester до того, как тот регистрируется через common.ring.
ingester:
  lifecycler:
    address: 127.0.0.1
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
    final_sleep: 0s
    heartbeat_period: 5s

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem

ruler:
  alertmanager_url: http://localhost:9093
