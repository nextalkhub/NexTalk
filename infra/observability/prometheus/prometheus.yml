# ─────────────────────────────────────────────────────────────────────────────
# Prometheus — Obs VPS
#
# Получает метрики двумя способами:
#   1. remote_write от k3s Prometheus (метрики NexTalk микросервисов)
#   2. Локальный scrape сервисов Obs VPS (OTel Collector, Loki, сам Prometheus)
#
# Запущен с флагом --web.enable-remote-write-receiver в docker-compose.observability.yaml.
# Grafana читает данные отсюда по http://prometheus:9090.
# ─────────────────────────────────────────────────────────────────────────────

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s

  external_labels:
    environment: production
    project:     nextalk

# ─── Локальные сервисы Obs VPS ───────────────────────────────────────────────
scrape_configs:

  # Self-monitoring Prometheus (OBS VPS). Отдельное имя чтобы не конфликтовать
  # с up{job="prometheus"} который remote_write шлёт k3s Prometheus.
  - job_name: prometheus-obs
    static_configs:
      - targets: ["localhost:9090"]

  # OTel Collector self-metrics
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]
        labels:
          service: otel-collector
    metrics_path: /metrics

  # Loki self-metrics
  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]
        labels:
          service: loki
    metrics_path: /metrics

  # Tempo self-metrics
  - job_name: tempo
    static_configs:
      - targets: ["tempo:3200"]
        labels:
          service: tempo
    metrics_path: /metrics

  # Grafana self-metrics
  - job_name: grafana
    static_configs:
      - targets: ["grafana:3000"]
        labels:
          service: grafana
    metrics_path: /metrics

# ─── DB VPS (postgres_exporter + redis_exporter + node_exporter) ─────────────

  # PostgreSQL — postgres_exporter на DB VPS (порт 9187)
  - job_name: postgres
    static_configs:
      - targets: ["10.19.0.31:9187"]
        labels:
          service: postgres

  # Redis — redis_exporter на DB VPS (порт 9121)
  - job_name: redis
    static_configs:
      - targets: ["10.19.0.31:9121"]
        labels:
          service: redis

  # Node metrics DB VPS — node_exporter (порт 9100)
  - job_name: db-node
    static_configs:
      - targets: ["10.19.0.31:9100"]
        labels:
          service: db-node
