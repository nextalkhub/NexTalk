# ─────────────────────────────────────────────────────────────────────────────
# Prometheus — NexTalk scrape configuration
#
# Все микросервисы используют prometheus-net + app.UseHttpMetrics() +
# app.MapMetrics(), что добавляет эндпоинт /metrics в формате OpenMetrics.
#
# Метрики (.NET + HTTP):
#   http_requests_received_total{method, endpoint, statusCode}
#   http_request_duration_seconds{method, endpoint, statusCode}
#   http_requests_in_progress{method, endpoint}
#   dotnet_gc_*  /  process_*
# ─────────────────────────────────────────────────────────────────────────────

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s

  external_labels:
    environment: development
    project:     nextalk

# ─── Микросервисы NexTalk ────────────────────────────────────────────────────
scrape_configs:

  - job_name: guild-service
    static_configs:
      - targets: ["guild-service:5001"]
        labels:
          service: guild-service
    metrics_path: /metrics

  - job_name: messaging-service
    static_configs:
      - targets: ["messaging-service:5002"]
        labels:
          service: messaging-service
    metrics_path: /metrics

  - job_name: voice-service
    static_configs:
      - targets: ["voice-service:5003"]
        labels:
          service: voice-service
    metrics_path: /metrics

  - job_name: websocket-gateway
    static_configs:
      - targets: ["websocket-gateway:5004"]
        labels:
          service: websocket-gateway
    metrics_path: /metrics

# ─── Observability infrastructure ───────────────────────────────────────────

  # Self-monitoring Prometheus
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # OTel Collector self-metrics (активны после того как хоть один pipeline запущен)
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]
        labels:
          service: otel-collector
    metrics_path: /metrics

  # Loki self-metrics
  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]
        labels:
          service: loki
    metrics_path: /metrics
