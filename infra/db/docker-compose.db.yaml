# ─────────────────────────────────────────────────────────────────────────────
# NexTalk — DB VPS (Beget)
#
# Запуск:
#   docker compose -f docker-compose.db.yaml up -d
#
# Безопасность:
#   PostgreSQL и Redis слушают на 0.0.0.0, но должны быть закрыты firewall-ом
#   для всех кроме приватной сети Beget (10.0.0.0/8 или аналог).
#   Пример (ufw):
#     ufw allow from 10.0.0.0/8 to any port 5432
#     ufw allow from 10.0.0.0/8 to any port 6379
#     ufw deny 5432
#     ufw deny 6379
#
# Переменные окружения — задать в .env рядом с этим файлом:
#   POSTGRES_PASSWORD=<strong-password>
#   REDIS_PASSWORD=<strong-password>
# ─────────────────────────────────────────────────────────────────────────────
name: nextalk-db

services:

  postgres:
    image: postgres:17-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: nextalk
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nextalk"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:8.6.2-alpine
    container_name: redis
    restart: unless-stopped
    # requirepass ограничивает доступ паролем даже внутри приватной сети
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --save 60 1
      --loglevel warning
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres-data:
  redis-data:
