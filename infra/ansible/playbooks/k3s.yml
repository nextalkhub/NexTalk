---
# Установка k3s HA + HAProxy.
#
# Порядок:
#   1. HAProxy уже развернут через haproxy.yml (запускается отдельно до k3s.yml).
#   2. На первой control-plane ноде: установить k3s server с cluster-init.
#   3. На остальных control-plane нодах: установить k3s server через HAProxy.
#   4. На воркерах: установить k3s agent.
#
# Запуск:
#   ansible-playbook -i inventory/hosts.ini playbooks/k3s.yml --ask-vault-pass

- name: Установка k3s server (control-plane)
  hosts: control_plane
  become: true
  gather_facts: true
  serial: 1
  roles:
    - k3s_server

- name: Установка k3s agent (workers)
  hosts: workers
  become: true
  gather_facts: true
  roles:
    - k3s_agent
