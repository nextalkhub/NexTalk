---
# Деплой NexTalk Helm-чарта в k3s.
#
# Требует:
#   - kubeconfig (получен после playbooks/k3s.yml).
#   - cluster-addons установлены (ingress-nginx, cert-manager).
#   - PostgreSQL и Redis доступны (db.yml).
#   - inventory/group_vars/vault.yml (зашифрован ansible-vault) с секретами.
#
# Запуск:
#   ansible-playbook -i inventory/hosts.ini playbooks/helm-deploy.yml \
#     -e image_tag=<sha-or-semver> --ask-vault-pass

- name: Helm deploy NexTalk
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  vars_files:
    # localhost не в группах из inventory — group_vars/vault.yml авто не подхватится.
    - "{{ playbook_dir }}/../inventory/group_vars/vault.yml"
  vars:
    kubeconfig: "{{ playbook_dir }}/../kubeconfig"
    helm_chart_dir: "{{ playbook_dir }}/../../../charts/nextalk"
    helm_release_name: nextalk
    helm_namespace: nextalk
    # Рендерится из templates/helm-secrets.values.yaml.j2 ниже.
    helm_secrets_rendered: "{{ playbook_dir }}/../.helm-secrets.values.yaml"
    helm_values_files:
      - "{{ helm_chart_dir }}/values.yaml"
      - "{{ helm_secrets_rendered }}"
    # Опциональный override тегов всех 5 наших сервисов одним значением.
    # Если пусто — берутся теги из values.yaml.
    image_tag: ""
  tasks:
    - name: Дождаться завершения удаления namespace (если завис в Terminating)
      ansible.builtin.command: >-
        kubectl --kubeconfig={{ kubeconfig }} get namespace {{ helm_namespace }}
      register: ns_check
      failed_when: false
      changed_when: false
      tags: [helm]

    - name: Снять финализаторы с namespace если он в Terminating
      ansible.builtin.shell: |
        kubectl --kubeconfig={{ kubeconfig }} get namespace {{ helm_namespace }} -o json \
          | python3 -c "import sys,json; d=json.load(sys.stdin); d['spec']['finalizers']=[]; print(json.dumps(d))" \
          | kubectl --kubeconfig={{ kubeconfig }} replace --raw /api/v1/namespaces/{{ helm_namespace }}/finalize -f -
      when:
        - ns_check.rc == 0
        - "'Terminating' in ns_check.stdout"
      tags: [helm]

    - name: Подождать пока namespace полностью исчезнет
      ansible.builtin.command: >-
        kubectl --kubeconfig={{ kubeconfig }} get namespace {{ helm_namespace }}
      register: ns_gone
      until: ns_gone.rc != 0
      retries: 30
      delay: 5
      failed_when: false
      changed_when: false
      when:
        - ns_check.rc == 0
        - "'Terminating' in ns_check.stdout"
      tags: [helm]

    - name: Создать namespace nextalk с Helm-метками и PSA privileged (идемпотентно)
      ansible.builtin.command: >-
        kubectl --kubeconfig={{ kubeconfig }} apply -f -
      args:
        stdin: |
          apiVersion: v1
          kind: Namespace
          metadata:
            name: {{ helm_namespace }}
            labels:
              app.kubernetes.io/managed-by: Helm
              pod-security.kubernetes.io/enforce: privileged
            annotations:
              meta.helm.sh/release-name: {{ helm_release_name }}
              meta.helm.sh/release-namespace: {{ helm_namespace }}
      tags: [helm]

    - name: Создать TLS secret cloudflare-origin-cert (только для provider=cloudflare)
      ansible.builtin.command: >-
        kubectl --kubeconfig={{ kubeconfig }} create secret tls cloudflare-origin-cert
        --cert={{ tls_certs_dir }}/origin.crt
        --key={{ tls_certs_dir }}/origin.key
        -n {{ helm_namespace }} --dry-run=client -o yaml
      register: tls_secret_yaml
      when: tls_provider == "cloudflare"
      tags: [helm]

    - name: Применить TLS secret (только для provider=cloudflare)
      ansible.builtin.command: kubectl --kubeconfig={{ kubeconfig }} apply -f -
      args:
        stdin: "{{ tls_secret_yaml.stdout }}"
      when: tls_provider == "cloudflare"
      tags: [helm]

    - name: Рендер секретного values-файла из vault + inventory
      ansible.builtin.template:
        src: helm-secrets.values.yaml.j2
        dest: "{{ helm_secrets_rendered }}"
        mode: '0600'
      no_log: true
      tags: [helm]

    - name: Собрать --set для image_tag (если задан)
      ansible.builtin.set_fact:
        helm_set_values: >-
          {{
            [
              {'value': 'guildService.image.tag=' ~ image_tag},
              {'value': 'messagingService.image.tag=' ~ image_tag},
              {'value': 'voiceService.image.tag=' ~ image_tag},
              {'value': 'websocketGateway.image.tag=' ~ image_tag},
              {'value': 'webSpa.image.tag=' ~ image_tag},
            ] if image_tag else []
          }}

    - name: Установить/обновить релиз nextalk
      kubernetes.core.helm:
        name: "{{ helm_release_name }}"
        chart_ref: "{{ helm_chart_dir }}"
        release_namespace: "{{ helm_namespace }}"
        create_namespace: true
        kubeconfig: "{{ kubeconfig }}"
        values_files: "{{ helm_values_files }}"
        set_values: "{{ helm_set_values }}"
        atomic: true
        wait: true
        timeout: 10m
      tags: [helm]

    - name: Удалить отрендеренный secrets-файл
      ansible.builtin.file:
        path: "{{ helm_secrets_rendered }}"
        state: absent
      tags: [helm]
