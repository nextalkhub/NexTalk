---
# Полный оркестратор: разворачивает ВСе с нуля.
#
# Запуск:
#   ansible-playbook -i inventory/hosts.ini playbooks/site.yml --ask-vault-pass
#
# Порядок осознанный:
#   1. bootstrap.yml      - пакеты, sysctl, ufw на всех нодах.
#   2. gre-nat.yml        - GRE-туннель для VPS без интернета (obs-vps через worker-1).
#   3. haproxy.yml        - HAProxy (балансировщик apiserver) до k3s.
#   4. db.yml             - Postgres + Redis.
#   5. observability.yml  - observability stack.
#   6. k3s.yml            - кластер k3s (cp + workers через HAProxy).
#   7. cluster-addons.yml - ingress-nginx + cert-manager.
#   8. argocd.yml         - ArgoCD + sealed-secrets, регистрация приложения.
#
# Приложение NexTalk дальше деплоит ArgoCD из git (GitOps), а не Ansible.
# После site.yml нужен ОДНОКРАТНЫЙ ручной шаг, чтобы поды получили секреты:
#   make seal && git add ../../argocd/sealed/nextalk-secrets.yaml \
#     && git commit -m 'secrets: sealed' && git push

- import_playbook: bootstrap.yml
- import_playbook: gre-nat.yml
- import_playbook: haproxy.yml
- import_playbook: db.yml
- import_playbook: observability.yml
- import_playbook: k3s.yml
- import_playbook: cluster-addons.yml
- import_playbook: argocd.yml
