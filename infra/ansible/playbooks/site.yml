---
# Полный оркестратор: разворачивает ВСЁ с нуля.
#
# Запуск:
#   ansible-playbook -i inventory/hosts.ini playbooks/site.yml --ask-vault-pass
#
# Порядок осознанный:
#   1. bootstrap.yml     — пакеты, sysctl, ufw на всех нодах.
#   2. haproxy.yml       — HAProxy (балансировщик apiserver) до k3s.
#   3. db.yml            — Postgres + Redis.
#   4. observability.yml — observability stack.
#   5. k3s.yml           — кластер k3s (cp + workers через HAProxy).
#   6. cluster-addons.yml — ingress-nginx + cert-manager.
#   7. helm-deploy.yml   — приложения NexTalk.

- import_playbook: bootstrap.yml
- import_playbook: haproxy.yml
- import_playbook: db.yml
- import_playbook: observability.yml
- import_playbook: k3s.yml
- import_playbook: cluster-addons.yml
- import_playbook: helm-deploy.yml
