---
# Базовая настройка ВСЕХ серверов: пакеты, sysctl, swap, ufw.
# Запускается первым, на голых VPS.
#
# Запуск:
#   ansible-playbook -i inventory/hosts.ini playbooks/bootstrap.yml --ask-vault-pass

- name: Bootstrap всех хостов (common + ufw + ssh_keys)
  hosts: all
  become: true
  gather_facts: true
  roles:
    - common
    - ufw
    - ssh_keys

# bastion (worker-1) — единственный SSH-эндпоинт извне.
# Дополнительно ставим fail2ban на этот хост.
# ssh_keys уже раскатаны выше — здесь только защита от перебора.
- name: SSH-hardening на bastion
  hosts: bastion
  become: true
  gather_facts: true
  tasks:
    - name: Установить fail2ban (re-run роли с override fail2ban)
      ansible.builtin.include_role:
        name: ssh_keys
      vars:
        ssh_keys_install_fail2ban: true
        # ВНИМАНИЕ: переключить в true только после раскатки ключей и проверки!
        ssh_keys_disable_passwords: false

# worker-1 = bastion = единственный публичный вход в кластер.
# Пробрасываем порт 6443 (kubectl/helm) → HAProxy, т.к. HAProxy находится
# только в приватной сети Beget и не имеет публичного IP.
- name: Настройка iptables port-forward 6443 → HAProxy на bastion
  hosts: bastion
  become: true
  gather_facts: true
  vars:
    haproxy_private_ip: "{{ hostvars[groups['haproxy'][0]]['ansible_host'] }}"
  tasks:
    - name: Установить iptables-persistent
      ansible.builtin.apt:
        name:
          - iptables-persistent
          - netfilter-persistent
        state: present
      tags: [bastion, iptables]

    - name: MASQUERADE исходящий трафик приватной сети (NAT gateway для CP/db/obs нод)
      ansible.builtin.iptables:
        table: nat
        chain: POSTROUTING
        source: "{{ private_network_cidr }}"
        out_interface: eth0
        jump: MASQUERADE
        comment: "nat gateway for private nodes"
      notify: save iptables
      tags: [bastion, iptables]

    - name: FORWARD разрешить транзитный трафик из приватной сети наружу
      ansible.builtin.iptables:
        chain: FORWARD
        in_interface: eth1
        out_interface: eth0
        jump: ACCEPT
        comment: "forward private → internet"
      notify: save iptables
      tags: [bastion, iptables]

    - name: FORWARD разрешить established/related обратный трафик
      ansible.builtin.iptables:
        chain: FORWARD
        in_interface: eth0
        out_interface: eth1
        ctstate: ESTABLISHED,RELATED
        jump: ACCEPT
        comment: "forward internet → private (established)"
      notify: save iptables
      tags: [bastion, iptables]

    - name: DNAT входящий TCP:6443 → HAProxy:6443 (PREROUTING)
      ansible.builtin.iptables:
        table: nat
        chain: PREROUTING
        protocol: tcp
        destination_port: "6443"
        jump: DNAT
        to_destination: "{{ haproxy_private_ip }}:6443"
        comment: "k8s api forward to haproxy"
      notify: save iptables
      tags: [bastion, iptables]

    - name: FORWARD разрешить проброшенный трафик к HAProxy:6443
      ansible.builtin.iptables:
        chain: FORWARD
        protocol: tcp
        destination: "{{ haproxy_private_ip }}"
        destination_port: "6443"
        jump: ACCEPT
        comment: "k8s api forward to haproxy"
      notify: save iptables
      tags: [bastion, iptables]

  handlers:
    - name: save iptables
      ansible.builtin.command: netfilter-persistent save
      changed_when: true
