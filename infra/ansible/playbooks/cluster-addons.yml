---
# Cluster-addons: ingress-nginx + cert-manager.
# Запускается ОДИН РАЗ после k3s.yml — оттуда уже есть kubeconfig.
#
# ingress-nginx как DaemonSet с hostNetwork=true: трафик 80/443 идёт
# напрямую на воркера, без NodePort/LoadBalancer.
#
# cert-manager + Let's Encrypt: ClusterIssuer лежит в Helm-чарте
# (charts/nextalk/templates/clusterissuer.yaml).
#
# Запуск (с локалки, где есть kubeconfig):
#   ansible-playbook -i inventory/hosts.ini playbooks/cluster-addons.yml

- name: Cluster addons (ingress-nginx + cert-manager)
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  vars:
    kubeconfig: "{{ playbook_dir }}/../kubeconfig"
  tasks:
    - name: Пометить worker-ноды меткой node-role.kubernetes.io/worker
      ansible.builtin.command: >-
        kubectl --kubeconfig={{ kubeconfig }}
        label nodes -l '!node-role.kubernetes.io/control-plane'
        node-role.kubernetes.io/worker= --overwrite
      tags: [addons, ingress]

    - name: Добавить Helm-репо ingress-nginx
      kubernetes.core.helm_repository:
        name: ingress-nginx
        repo_url: https://kubernetes.github.io/ingress-nginx
      tags: [addons, ingress]

    - name: Установить ingress-nginx (DaemonSet + hostNetwork)
      kubernetes.core.helm:
        name: ingress-nginx
        chart_ref: ingress-nginx/ingress-nginx
        release_namespace: ingress-nginx
        create_namespace: true
        kubeconfig: "{{ kubeconfig }}"
        values:
          controller:
            kind: DaemonSet
            hostNetwork: true
            hostPort:
              enabled: true
            dnsPolicy: ClusterFirstWithHostNet
            service:
              enabled: false  # нам не нужен Service типа LoadBalancer
            nodeSelector:
              kubernetes.io/os: linux
              node-role.kubernetes.io/worker: ""
            tolerations: []
            ingressClassResource:
              name: nginx
              default: true
            config:
              use-forwarded-headers: "true"
              compute-full-forwarded-for: "true"
              proxy-body-size: "50m"
      tags: [addons, ingress]

    - name: Добавить Helm-репо metrics-server
      kubernetes.core.helm_repository:
        name: metrics-server
        repo_url: https://kubernetes-sigs.github.io/metrics-server/
      tags: [addons, metrics-server]

    # Если metrics-server был установлен вручную (kubectl apply), Helm не может
    # усыновить его ресурсы без меток. Удаляем старую установку, чтобы Helm
    # поставил заново. На свежем кластере команда вернёт "ok" без изменений.
    - name: Удалить metrics-server вне Helm (миграция на Helm-управление)
      ansible.builtin.shell: |
        MANAGED=$(kubectl --kubeconfig={{ kubeconfig }} get serviceaccount metrics-server \
          -n kube-system -o jsonpath='{.metadata.labels.app\.kubernetes\.io/managed-by}' 2>/dev/null || echo "notfound")
        if [ "$MANAGED" = "Helm" ] || [ "$MANAGED" = "notfound" ]; then
          echo "ok"
        else
          kubectl --kubeconfig={{ kubeconfig }} delete --ignore-not-found \
            serviceaccount/metrics-server \
            clusterrole/system:aggregated-metrics-reader \
            clusterrole/system:metrics-server \
            clusterrolebinding/metrics-server:system:auth-delegator \
            clusterrolebinding/system:metrics-server \
            service/metrics-server \
            deployment/metrics-server \
            -n kube-system
          kubectl --kubeconfig={{ kubeconfig }} delete --ignore-not-found \
            rolebinding/metrics-server-auth-reader -n kube-system
          kubectl --kubeconfig={{ kubeconfig }} delete --ignore-not-found \
            apiservice/v1beta1.metrics.k8s.io
          echo "deleted"
        fi
      register: ms_migration
      changed_when: '"deleted" in ms_migration.stdout'
      tags: [addons, metrics-server]

    - name: Установить metrics-server
      kubernetes.core.helm:
        name: metrics-server
        chart_ref: metrics-server/metrics-server
        release_namespace: kube-system
        create_namespace: false
        kubeconfig: "{{ kubeconfig }}"
        values:
          args:
            - --kubelet-insecure-tls
      tags: [addons, metrics-server]

    - name: Добавить Helm-репо jetstack (cert-manager)
      kubernetes.core.helm_repository:
        name: jetstack
        repo_url: https://charts.jetstack.io
      tags: [addons, cert-manager]

    - name: Установить cert-manager
      kubernetes.core.helm:
        name: cert-manager
        chart_ref: jetstack/cert-manager
        release_namespace: cert-manager
        create_namespace: true
        kubeconfig: "{{ kubeconfig }}"
        values:
          installCRDs: true
      tags: [addons, cert-manager]
