---
# Cluster-addons: ingress-nginx + cert-manager.
# Запускается ОДИН РАЗ после k3s.yml - оттуда уже есть kubeconfig.
#
# ingress-nginx как DaemonSet с hostNetwork=true: трафик 80/443 идет
# напрямую на воркера, без NodePort/LoadBalancer.
#
# cert-manager + Let's Encrypt: ClusterIssuer лежит в Helm-чарте
# (charts/nextalk/templates/clusterissuer.yaml).
#
# Перед запуском открыть SSH-туннель к HAProxy:
#   ssh -L 6443:10.19.0.51:6443 -i ~/.ssh/nextalk_deploy root@<bastion_public_ip> -N
# Запуск:
#   ansible-playbook -i inventory/hosts.ini playbooks/cluster-addons.yml

- name: Cluster addons (ingress-nginx + cert-manager)
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  vars:
    kubeconfig: "{{ playbook_dir }}/../kubeconfig"
  tasks:
    - name: Пометить worker-ноды меткой node-role.kubernetes.io/worker
      ansible.builtin.command: >-
        kubectl --kubeconfig={{ kubeconfig }}
        label nodes -l '!node-role.kubernetes.io/control-plane'
        node-role.kubernetes.io/worker= --overwrite
      tags: [addons, ingress]

    - name: Добавить Helm-репо ingress-nginx
      kubernetes.core.helm_repository:
        name: ingress-nginx
        repo_url: https://kubernetes.github.io/ingress-nginx
      tags: [addons, ingress]

    # release-assets.githubusercontent.com заблокирован в РФ - chart download
    # упадет по таймауту если ingress-nginx еще не установлен. Если DaemonSet
    # уже есть - пропускаем: нет смысла перекачивать чарт при каждом запуске.
    - name: Проверить наличие DaemonSet ingress-nginx-controller
      ansible.builtin.command: >-
        kubectl --kubeconfig={{ kubeconfig }}
        get daemonset ingress-nginx-controller -n ingress-nginx
      register: ingress_ds_check
      failed_when: false
      changed_when: false
      tags: [addons, ingress]

    - name: Установить ingress-nginx (DaemonSet + hostNetwork)
      kubernetes.core.helm:
        name: ingress-nginx
        chart_ref: ingress-nginx/ingress-nginx
        release_namespace: ingress-nginx
        create_namespace: true
        kubeconfig: "{{ kubeconfig }}"
        values:
          controller:
            kind: DaemonSet
            hostNetwork: true
            hostPort:
              enabled: true
            dnsPolicy: ClusterFirstWithHostNet
            service:
              enabled: false
            nodeSelector:
              kubernetes.io/os: linux
              node-role.kubernetes.io/worker: ""
            tolerations: []
            ingressClassResource:
              name: nginx
              default: true
            config:
              use-forwarded-headers: "true"
              compute-full-forwarded-for: "true"
              proxy-body-size: "50m"
      when: ingress_ds_check.rc != 0
      tags: [addons, ingress]

    - name: Добавить Helm-репо metrics-server
      kubernetes.core.helm_repository:
        name: metrics-server
        repo_url: https://kubernetes-sigs.github.io/metrics-server/
      tags: [addons, metrics-server]

    # spec.selector в Deployment immutable - helm upgrade не может поменять labels
    # при смене версии чарта. Сносим старый релиз (Helm или ручной), ставим заново.
    - name: Проверить наличие Helm-релиза metrics-server
      ansible.builtin.command: >-
        helm status metrics-server -n kube-system --kubeconfig={{ kubeconfig }}
      register: ms_helm_status
      failed_when: false
      changed_when: false
      tags: [addons, metrics-server]

    - name: Удалить Helm-релиз metrics-server (пересоздание при смене chart)
      kubernetes.core.helm:
        name: metrics-server
        release_namespace: kube-system
        kubeconfig: "{{ kubeconfig }}"
        state: absent
      when: ms_helm_status.rc == 0
      tags: [addons, metrics-server]

    - name: Удалить metrics-server установленный вне Helm
      ansible.builtin.shell: |
        kubectl --kubeconfig={{ kubeconfig }} delete --ignore-not-found \
          serviceaccount/metrics-server \
          clusterrole/system:aggregated-metrics-reader \
          clusterrole/system:metrics-server \
          clusterrolebinding/metrics-server:system:auth-delegator \
          clusterrolebinding/system:metrics-server \
          service/metrics-server \
          deployment/metrics-server \
          -n kube-system
        kubectl --kubeconfig={{ kubeconfig }} delete --ignore-not-found \
          rolebinding/metrics-server-auth-reader -n kube-system
        kubectl --kubeconfig={{ kubeconfig }} delete --ignore-not-found \
          apiservice/v1beta1.metrics.k8s.io
        echo "done"
      changed_when: false
      when: ms_helm_status.rc != 0
      tags: [addons, metrics-server]

    - name: Установить metrics-server
      kubernetes.core.helm:
        name: metrics-server
        chart_ref: metrics-server/metrics-server
        release_namespace: kube-system
        create_namespace: false
        kubeconfig: "{{ kubeconfig }}"
        values:
          args:
            - --kubelet-insecure-tls
      tags: [addons, metrics-server]

    # Beget выдает нодам DNS 198.18.18.18 (внутренний резолвер провайдера).
    # Этот IP доступен с хостового интерфейса ноды, но недоступен из pod-сети
    # через flannel VXLAN - CoreDNS получает i/o timeout и возвращает SERVFAIL.
    # Заменяем forward на публичные DNS (Google + Cloudflare).
    # Аннотация objectset.rio.cattle.io/applied удаляется, чтобы k3s-контроллер
    # не откатил изменение при следующей синхронизации Addon-ресурса.
    #
    # ВАЖНО: никогда не делать `kubectl rollout restart deployment/coredns`.
    # Если новый pod не может подтянуть образ - DNS ляжет полностью.
    # CoreDNS сам перечитывает ConfigMap через reload-плагин (~30 сек).
    - name: Исправить CoreDNS - форвардер на 8.8.8.8 вместо /etc/resolv.conf
      ansible.builtin.shell: |
        COREFILE=$(kubectl --kubeconfig={{ kubeconfig }} get cm coredns -n kube-system -o jsonpath='{.data.Corefile}')
        if echo "$COREFILE" | grep -q 'forward . /etc/resolv.conf'; then
          kubectl --kubeconfig={{ kubeconfig }} get cm coredns -n kube-system -o json \
            | python3 -c "import sys,json;d=json.load(sys.stdin);d['data']['Corefile']=d['data']['Corefile'].replace('forward . /etc/resolv.conf','forward . 8.8.8.8 1.1.1.1');print(json.dumps(d))" \
            | kubectl --kubeconfig={{ kubeconfig }} apply -f -
          kubectl --kubeconfig={{ kubeconfig }} annotate configmap coredns \
            -n kube-system 'objectset.rio.cattle.io/applied-' || true
          echo "patched"
        else
          echo "already_ok"
        fi
      register: coredns_fix
      changed_when: '"patched" in coredns_fix.stdout'
      tags: [addons, coredns]

    # OCI-зеркало на quay.io (Red Hat) - не блокируется в РФ в отличие от charts.jetstack.io (Cloudflare).
    - name: Установить cert-manager (OCI quay.io)
      kubernetes.core.helm:
        name: cert-manager
        chart_ref: oci://quay.io/jetstack/charts/cert-manager
        chart_version: "v1.17.2"
        release_namespace: cert-manager
        create_namespace: true
        kubeconfig: "{{ kubeconfig }}"
        values:
          installCRDs: true
      tags: [addons, cert-manager]

    # Webhook cert-manager регистрирует ValidatingWebhookConfiguration.
    # ClusterIssuer нельзя создавать раньше - API-сервер отправит запрос на
    # вебхук, которого еще нет, и helm upgrade упадет с connection refused.
    - name: Дождаться готовности cert-manager webhook
      ansible.builtin.command: >-
        kubectl --kubeconfig={{ kubeconfig }}
        wait deployment/cert-manager-webhook
        -n cert-manager
        --for=condition=Available
        --timeout=120s
      tags: [addons, cert-manager]
