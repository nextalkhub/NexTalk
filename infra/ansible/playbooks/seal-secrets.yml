---
# Запечатывание секретов приложения в SealedSecret для GitOps.
#
# Структура секрета НЕ дублируется: она живет только в чарте
# (charts/nextalk/templates/secrets.yaml). Здесь мы рендерим этот же шаблон
# с secrets.create=true и значениями из vault, затем запечатываем kubeseal.
# Результат - argocd/sealed/nextalk-secrets.yaml, который коммитится в git;
# ArgoCD применяет его, контроллер sealed-secrets расшифровывает в Secret.
#
# Требует на локалке: helm, kubeseal, kubeconfig, vault.yml.
# Контроллер sealed-secrets должен быть установлен (playbooks/argocd.yml).
#
# Запуск:
#   ansible-playbook -i inventory/hosts.ini playbooks/seal-secrets.yml --ask-vault-pass

- name: Seal NexTalk secrets
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  vars_files:
    - "{{ playbook_dir }}/../inventory/group_vars/all/vault.yml"
  vars:
    kubeconfig: "{{ playbook_dir }}/../kubeconfig"
    chart_dir: "{{ playbook_dir }}/../../../charts/nextalk"
    sealed_out: "{{ playbook_dir }}/../../../argocd/sealed/nextalk-secrets.yaml"
    secret_values_rendered: "{{ playbook_dir }}/../.helm-secrets.values.yaml"
    sealed_controller_name: sealed-secrets
    sealed_controller_namespace: kube-system
  tasks:
    - name: Проверить наличие helm и kubeseal
      ansible.builtin.command: "{{ item }} --help"
      loop: ["helm", "kubeseal"]
      changed_when: false
      register: tool_check
      failed_when: tool_check.rc != 0

    - name: Рендер секретных values из vault (только секреты)
      ansible.builtin.template:
        src: helm-secrets.values.yaml.j2
        dest: "{{ secret_values_rendered }}"
        mode: '0600'
      no_log: true

    # helm рендерит ТОЛЬКО Secret из чарта (-s templates/secrets.yaml) с
    # secrets.create=true. Не-секретные значения (db.host и т.д.) берутся из
    # values.yaml чарта автоматически, секреты - из отрендеренного файла.
    - name: Отрендерить Secret nextalk-secrets из чарта
      ansible.builtin.command: >-
        helm template nextalk {{ chart_dir }}
        -s templates/secrets.yaml
        --set secrets.create=true
        -f {{ secret_values_rendered }}
      register: secret_manifest
      changed_when: false
      no_log: true

    # kubeseal шифрует Secret публичным ключом контроллера (тянет его из
    # кластера по kubeconfig). Результат безопасно коммитить в git.
    - name: Запечатать Secret в SealedSecret (kubeseal)
      ansible.builtin.command:
        cmd: >-
          kubeseal
          --controller-name {{ sealed_controller_name }}
          --controller-namespace {{ sealed_controller_namespace }}
          --kubeconfig {{ kubeconfig }}
          --format yaml
        stdin: "{{ secret_manifest.stdout }}"
      register: sealed
      changed_when: false
      no_log: true

    - name: Записать argocd/sealed/nextalk-secrets.yaml
      ansible.builtin.copy:
        dest: "{{ sealed_out }}"
        content: "{{ sealed.stdout }}\n"
        mode: '0644'

    - name: Удалить отрендеренный plaintext-файл секретов
      ansible.builtin.file:
        path: "{{ secret_values_rendered }}"
        state: absent

    - name: Готово
      ansible.builtin.debug:
        msg:
          - "Запечатано: {{ sealed_out }}"
          - "Закоммить и запушь, чтобы ArgoCD применил секрет:"
          - "  git add {{ sealed_out }}"
          - "  git commit -m 'secrets: обновить sealed nextalk-secrets'"
          - "  git push"
