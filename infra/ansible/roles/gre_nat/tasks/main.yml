---
# Настройка GRE-туннеля для выхода в интернет через шлюз.
# Переменные:
#   gre_nat_mode        - gateway | client
#   gre_iface           - имя интерфейса туннеля (gre1, gre2, ...), по умолчанию gre1
#   gre_local_ip        - приватный IP этого хоста
#   gre_remote_ip       - приватный IP другой стороны туннеля
#   gre_tunnel_ip       - адрес этого хоста внутри туннеля (172.16.x.y/30)
#   gre_peer_tunnel_ip  - адрес шлюза внутри туннеля (нужен клиенту для маршрута)
#   gre_public_iface    - публичный интерфейс шлюза (нужен только gateway, обычно eth0)
#   gre_marker          - суффикс для blockinfile marker, уникальный на хост (напр. "DB")

- name: Поднять GRE-туннель {{ gre_iface | default('gre1') }}
  ansible.builtin.command:
    cmd: "ip link add {{ gre_iface | default('gre1') }} type gre local {{ gre_local_ip }} remote {{ gre_remote_ip }}"
  register: gre_add
  changed_when: gre_add.rc == 0
  failed_when: gre_add.rc != 0 and 'File exists' not in gre_add.stderr and 'already exists' not in gre_add.stderr
  tags: [gre_nat]

- name: Включить интерфейс {{ gre_iface | default('gre1') }}
  ansible.builtin.command:
    cmd: "ip link set {{ gre_iface | default('gre1') }} up"
  changed_when: true
  tags: [gre_nat]

- name: Назначить адрес туннелю
  ansible.builtin.command:
    cmd: "ip addr add {{ gre_tunnel_ip }}/30 dev {{ gre_iface | default('gre1') }}"
  register: addr_add
  changed_when: addr_add.rc == 0
  failed_when: addr_add.rc != 0 and 'File exists' not in addr_add.stderr and 'Address already assigned' not in addr_add.stderr
  tags: [gre_nat]

- name: Включить ip_forward (gateway)
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_set: true
    state: present
    reload: true
  when: gre_nat_mode == 'gateway'
  tags: [gre_nat]

- name: Добавить MASQUERADE (gateway)
  ansible.builtin.iptables:
    table: nat
    chain: POSTROUTING
    out_interface: "{{ gre_public_iface }}"
    jump: MASQUERADE
    state: present
  when: gre_nat_mode == 'gateway'
  tags: [gre_nat]

- name: Разрешить FORWARD из туннеля в интернет (gateway)
  ansible.builtin.iptables:
    chain: FORWARD
    in_interface: "{{ gre_iface | default('gre1') }}"
    out_interface: "{{ gre_public_iface }}"
    jump: ACCEPT
    state: present
  when: gre_nat_mode == 'gateway'
  tags: [gre_nat]

- name: Разрешить FORWARD ответов из интернета в туннель (gateway)
  ansible.builtin.iptables:
    chain: FORWARD
    in_interface: "{{ gre_public_iface }}"
    out_interface: "{{ gre_iface | default('gre1') }}"
    ctstate: RELATED,ESTABLISHED
    jump: ACCEPT
    state: present
  when: gre_nat_mode == 'gateway'
  tags: [gre_nat]

- name: Установить default route через GRE-шлюз (client)
  ansible.builtin.command:
    cmd: "ip route replace default via {{ gre_peer_tunnel_ip }} dev {{ gre_iface | default('gre1') }}"
  changed_when: true
  when: gre_nat_mode == 'client'
  tags: [gre_nat]

# ── Персистентность ────────────────────────────────────────────────────────────

- name: Сохранить конфиг туннеля в /etc/network/interfaces (gateway)
  ansible.builtin.blockinfile:
    path: /etc/network/interfaces
    marker: "# {mark} GRE NAT GATEWAY {{ gre_marker | default(gre_iface | default('gre1')) | upper }}"
    block: |
      auto {{ gre_iface | default('gre1') }}
      iface {{ gre_iface | default('gre1') }} inet static
          address {{ gre_tunnel_ip }}/30
          pre-up iptunnel add {{ gre_iface | default('gre1') }} mode gre local {{ gre_local_ip }} remote {{ gre_remote_ip }}
          post-down iptunnel del {{ gre_iface | default('gre1') }}
  when: gre_nat_mode == 'gateway'
  tags: [gre_nat]

- name: Сохранить конфиг туннеля в /etc/network/interfaces (client)
  ansible.builtin.blockinfile:
    path: /etc/network/interfaces
    marker: "# {mark} GRE NAT CLIENT {{ gre_marker | default(gre_iface | default('gre1')) | upper }}"
    block: |
      auto {{ gre_iface | default('gre1') }}
      iface {{ gre_iface | default('gre1') }} inet static
          address {{ gre_tunnel_ip }}/30
          pre-up iptunnel add {{ gre_iface | default('gre1') }} mode gre local {{ gre_local_ip }} remote {{ gre_remote_ip }}
          post-up ip route replace default via {{ gre_peer_tunnel_ip }} dev {{ gre_iface | default('gre1') }}
          post-down iptunnel del {{ gre_iface | default('gre1') }}
  when: gre_nat_mode == 'client'
  tags: [gre_nat]

- name: Включить ip_forward постоянно в sysctl.conf (gateway)
  ansible.builtin.lineinfile:
    path: /etc/sysctl.conf
    regexp: '^net.ipv4.ip_forward'
    line: 'net.ipv4.ip_forward = 1'
    state: present
  when: gre_nat_mode == 'gateway'
  tags: [gre_nat]

- name: Установить iptables-persistent (gateway)
  ansible.builtin.apt:
    name: iptables-persistent
    state: present
    lock_timeout: 60
  when: gre_nat_mode == 'gateway'
  tags: [gre_nat]

- name: Сохранить iptables (gateway)
  ansible.builtin.shell:
    cmd: "iptables-save > /etc/iptables/rules.v4"
  changed_when: true
  when: gre_nat_mode == 'gateway'
  tags: [gre_nat]

- name: Включить netfilter-persistent (gateway)
  ansible.builtin.systemd:
    name: netfilter-persistent
    enabled: true
    state: started
  when: gre_nat_mode == 'gateway'
  tags: [gre_nat]
