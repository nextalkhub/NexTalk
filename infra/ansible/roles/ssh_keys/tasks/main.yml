---
# Раскатывает публичные ключи команды и CI на root@<host>:~/.ssh/authorized_keys.
# Файлы читаются с controller (lookup file), хост их не видит.

- name: Добавить team-ключи в authorized_keys root
  ansible.posix.authorized_key:
    user: root
    state: present
    key: "{{ lookup('file', item) }}"
    exclusive: false
  with_fileglob:
    - "{{ ssh_keys_team_glob }}"
  tags: [ssh, ssh_keys]

- name: Добавить CI deploy-key в authorized_keys root
  ansible.posix.authorized_key:
    user: root
    state: present
    key: "{{ lookup('file', item) }}"
    exclusive: false
    # Ограничиваем CI-ключ: только команды для деплоя, никаких port-forwarding и pty.
    # Если хочешь дать CI полный shell — убери опции.
    key_options: 'no-port-forwarding,no-X11-forwarding,no-agent-forwarding'
  with_fileglob:
    - "{{ ssh_keys_ci_glob }}"
  tags: [ssh, ssh_keys, ci]

# ---------- Hardening (по умолчанию выключено) ----------

- name: Отключить парольную аутентификацию SSH
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?\s*PasswordAuthentication\s+'
    line: 'PasswordAuthentication no'
    validate: '/usr/sbin/sshd -t -f %s'
  when: ssh_keys_disable_passwords | bool
  notify: restart sshd
  tags: [ssh, ssh_hardening]

- name: Запретить root-вход по паролю (только по ключу)
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?\s*PermitRootLogin\s+'
    line: 'PermitRootLogin prohibit-password'
    validate: '/usr/sbin/sshd -t -f %s'
  when: ssh_keys_disable_passwords | bool
  notify: restart sshd
  tags: [ssh, ssh_hardening]

- name: Отключить interactive challenge-response auth (защита от PAM-обхода)
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?\s*KbdInteractiveAuthentication\s+'
    line: 'KbdInteractiveAuthentication no'
    validate: '/usr/sbin/sshd -t -f %s'
  when: ssh_keys_disable_passwords | bool
  notify: restart sshd
  tags: [ssh, ssh_hardening]

# ---------- fail2ban (опционально на bastion) ----------

- name: Установить fail2ban
  ansible.builtin.apt:
    name: fail2ban
    state: present
  when: ssh_keys_install_fail2ban | bool
  tags: [ssh, fail2ban]

- name: Включить sshd jail в fail2ban
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.d/sshd.conf
    content: |
      [sshd]
      enabled = true
      port = ssh
      maxretry = 5
      findtime = 10m
      bantime = 1h
    owner: root
    group: root
    mode: '0644'
  when: ssh_keys_install_fail2ban | bool
  notify: restart fail2ban
  tags: [ssh, fail2ban]

- name: Включить и запустить fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true
    state: started
  when: ssh_keys_install_fail2ban | bool
  tags: [ssh, fail2ban]
