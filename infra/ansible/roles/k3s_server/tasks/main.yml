---
# Установка k3s в режиме server. Порядок:
#   1. Положить config.yaml (со всеми флагами).
#   2. На первой control-plane ноде — cluster-init.
#   3. На остальных — server: https://VIP:6443.
#
# Документация: https://docs.k3s.io/installation/configuration
# HA с embedded etcd: https://docs.k3s.io/datastore/ha-embedded

# Beget выдаёт нодам DNS 198.18.18.18 (Beget-внутренний резолвер).
# Из pod-сети через flannel VXLAN он недоступен — CoreDNS возвращает SERVFAIL.
# Создаём отдельный resolv.conf с публичным DNS до старта k3s.
- name: Создать /etc/k3s-resolv.conf с публичным DNS
  ansible.builtin.copy:
    dest: /etc/k3s-resolv.conf
    content: |
      nameserver 8.8.8.8
      nameserver 1.1.1.1
    owner: root
    group: root
    mode: '0644'
  tags: [k3s, k3s_server]

- name: Создать /etc/rancher/k3s
  ansible.builtin.file:
    path: "{{ k3s_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  tags: [k3s, k3s_server]

- name: Положить /etc/rancher/k3s/config.yaml
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ k3s_config_dir }}/config.yaml"
    owner: root
    group: root
    mode: '0600'
  tags: [k3s, k3s_server]

# PSA config должен существовать ДО первого старта kube-apiserver,
# иначе apiserver не поднимется из-за невалидного флага.
- name: Создать /var/lib/rancher/k3s/server
  ansible.builtin.file:
    path: "{{ k3s_data_dir }}/server"
    state: directory
    owner: root
    group: root
    mode: '0700'
  tags: [k3s, k3s_server]

- name: Положить PodSecurity admission config
  ansible.builtin.template:
    src: psa.yaml.j2
    dest: "{{ k3s_data_dir }}/server/psa.yaml"
    owner: root
    group: root
    mode: '0600'
  tags: [k3s, k3s_server]

- name: Положить /etc/rancher/k3s/registries.yaml
  ansible.builtin.template:
    src: registries.yaml.j2
    dest: "{{ k3s_config_dir }}/registries.yaml"
    owner: root
    group: root
    mode: '0644'
  notify: restart k3s
  tags: [k3s, k3s_server]

- name: Проверить наличие установленного k3s
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary
  tags: [k3s, k3s_server]

# --- Установка первой control-plane ноды (cluster-init) ----------------------
- name: Установить k3s server на первой control-plane ноде
  ansible.builtin.shell: |
    set -euo pipefail
    curl -sfL {{ k3s_install_script }} | \
      INSTALL_K3S_EXEC="server" \
      sh -
  args:
    executable: /bin/bash
    creates: /usr/local/bin/k3s
  when:
    - inventory_hostname == groups['control_plane'][0]
  tags: [k3s, k3s_server]

- name: Дождаться готовности apiserver на первой control-plane ноде
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: 6443
    timeout: 180
  when: inventory_hostname == groups['control_plane'][0]
  tags: [k3s, k3s_server]

# --- Установка остальных control-plane нод через HAProxy --------------------
- name: Подождать apiserver через HAProxy
  ansible.builtin.wait_for:
    host: "{{ k3s_api_endpoint }}"
    port: 6443
    timeout: 120
  when: inventory_hostname != groups['control_plane'][0]
  tags: [k3s, k3s_server]

- name: Установить k3s server на остальных control-plane нодах
  ansible.builtin.shell: |
    set -euo pipefail
    curl -sfL {{ k3s_install_script }} | \
      INSTALL_K3S_EXEC="server" \
      sh -
  args:
    executable: /bin/bash
    creates: /usr/local/bin/k3s
  when: inventory_hostname != groups['control_plane'][0]
  tags: [k3s, k3s_server]

- name: Дождаться готовности apiserver на остальных control-plane нодах
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: 6443
    timeout: 180
  when: inventory_hostname != groups['control_plane'][0]
  tags: [k3s, k3s_server]

# --- Удобство: вытащить kubeconfig локально ----------------------------------
- name: Прочитать kubeconfig с первой control-plane ноды
  ansible.builtin.slurp:
    src: "{{ k3s_kubeconfig_path }}"
  register: k3s_kubeconfig
  when: inventory_hostname == groups['control_plane'][0]
  tags: [k3s, k3s_server, kubeconfig]

- name: Сохранить kubeconfig локально
  ansible.builtin.copy:
    content: "{{ k3s_kubeconfig.content | b64decode }}"
    dest: "{{ playbook_dir }}/../kubeconfig"
    mode: '0600'
  when: inventory_hostname == groups['control_plane'][0]
  delegate_to: localhost
  become: false
  tags: [k3s, k3s_server, kubeconfig]

