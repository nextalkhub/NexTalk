---
ufw_extra_rules:
  - { rule: allow, port: '6443', proto: tcp, src: "{{ private_network_cidr }}", comment: 'k3s apiserver proxy' }
  # Поды (kubernetes_sd_configs) обращаются к API через HAProxy из pod CIDR
  - { rule: allow, port: '6443', proto: tcp, src: "{{ k3s_cluster_cidr }}", comment: 'k3s apiserver proxy (pod cidr)' }
  - { rule: allow, port: '9000', proto: tcp, src: "{{ private_network_cidr }}", comment: 'haproxy stats' }
