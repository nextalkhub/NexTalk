---
# Токен кластера. Задаётся один раз при bootstrap, им же шифруются bootstrap-данные
# в etcd. Поменять правкой config.yaml нельзя - нода не поднимется после рестарта
# (bootstrap data encrypted with different token). Сменить токен можно только через
# `k3s token rotate`, потом обновить vault и config.
# default не ставим: при незагруженном vault он молча подставлял плейсхолдер, на
# котором кластер и бутстрапился. mandatory вместо этого падает с понятной ошибкой.
k3s_token: "{{ vault_k3s_token | mandatory }}"

# Что отключить в k3s. Traefik заменяется ingress-nginx, servicelb - на hostNetwork ingress.
# metrics-server отключён - встроенный k3s-аддон использует k8s-app selector,
# Helm-чарт kubernetes-sigs использует app.kubernetes.io/name: конфликт immutable field.
k3s_server_disable:
  - traefik
  - servicelb
  - metrics-server

# TLS SAN для apiserver: VIP + IP каждой control-plane ноды.
# Заполняется в roles/k3s_server из inventory.
