---
# Переменные для роли k6 (chaos/load testing).
# Секреты (k6_grafana_password, k6_test_token) — в vault.yml.

k6_chaos_dir: /opt/nextalk-chaos

# Cluster topology (должны совпадать с реальными IP из hosts.ini)
k6_namespace: nextalk
k6_domain: nextalk.fun
k6_cp1: "{{ hostvars['control-plane-1']['ansible_host'] }}"
k6_cp2: "{{ hostvars['control-plane-2']['ansible_host'] }}"
k6_cp3: "{{ hostvars['control-plane-3']['ansible_host'] }}"
k6_db_vps: "{{ hostvars['db-vps']['ansible_host'] }}"
k6_obs_vps: "{{ hostvars['observability-vps']['ansible_host'] }}"

# Endpoints
k6_api_base: "https://api.nextalk.fun"
k6_grafana_url: "https://grafana.nextalk.fun"
k6_prometheus_remote_write: "http://{{ hostvars['observability-vps']['ansible_host'] }}:9090/api/v1/write"

# Grafana
k6_grafana_user: admin
k6_grafana_password: "{{ vault_k6_grafana_password }}"
k6_grafana_dashboard_uid: nextalk-overview

# k6 thresholds
k6_vus_baseline: 20
k6_vus_spike: 100
k6_duration_baseline: 5m
k6_duration_spike: 3m

# Timeouts
k6_wait_healthy_timeout: 120

# Test credentials
k6_test_user_id: chaos-test-user
k6_test_token: "{{ vault_k6_test_token }}"

# SSH для SC-03 (Redis restart)
k6_ssh_user: root
