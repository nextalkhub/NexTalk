# NexTalk - Observability Stack
#
# Запуск поверх основного docker-compose:
#
#   docker compose -f docker-compose.yaml -f docker-compose.observability.yaml up -d
#
# Только observability (для отладки стека):
#
#   docker compose -f docker-compose.observability.yaml up -d
#
# Доступ:
#   Grafana     → http://localhost:3000   (admin / ${GRAFANA_ADMIN_PASSWORD:-admin})
#   Prometheus  → http://localhost:9090
#   Loki        → http://localhost:3100
#   Tempo       → http://localhost:3200
#   Alloy UI    → http://localhost:12345
#
# Трейсы (если OpenTelemetry настроен в сервисах) - Tempo принимает OTLP напрямую:
#   gRPC → localhost:4317
#   HTTP → localhost:4318
#
# Конфиги: infra/observability/{prometheus,loki,alloy,tempo,grafana}/

name: nextalk

services:

  # ── Prometheus ──────────────────────────────────────────────────────────────
  # Скрейпит /metrics у микросервисов каждые 15 сек.
  # remote_write включен - принимает метрики от внешних источников.
  prometheus:
    image: prom/prometheus:v3.11.3
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
      - "--web.enable-remote-write-receiver"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    volumes:
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - nextalk
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Loki ────────────────────────────────────────────────────────────────────
  # Агрегирует и хранит логи. Принимает потоки от Alloy.
  # Запускается от root (uid 0) - named volume создается как root:root,
  # иначе Loki не может писать в /loki/chunks.
  loki:
    image: grafana/loki:3.7.2
    container_name: loki
    restart: unless-stopped
    user: "0:0"
    command: ["-config.file=/etc/loki/config.yaml", "-target=all"]
    volumes:
      - ./infra/observability/loki/loki-config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks:
      - nextalk
    healthcheck:
      # Loki 3.6+ - distroless образ, нет curl/wget. loki -version выходит с кодом 0.
      test: ["CMD", "loki", "-version"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 45s

  # ── Alloy ───────────────────────────────────────────────────────────────────
  # Собирает логи контейнеров nextalk через Docker API.
  # Парсит Serilog CompactJson, кладет structured_metadata (TraceId/SpanId) в Loki.
  alloy:
    image: grafana/alloy:v1.16.1
    container_name: alloy
    restart: unless-stopped
    command: ["run", "/etc/alloy/config.alloy"]
    volumes:
      - ./infra/observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "12345:12345"   # Alloy UI (опционально)
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - nextalk
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/12345"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Tempo ───────────────────────────────────────────────────────────────────
  # Distributed tracing backend. Принимает OTLP напрямую от сервисов.
  # metrics_generator → RED-метрики из трейсов → Prometheus remote_write.
  tempo:
    image: grafana/tempo:2.7.2
    container_name: tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./infra/observability/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP API (Grafana datasource)
      - "4317:4317"   # OTLP gRPC (трейсы от сервисов)
      - "4318:4318"   # OTLP HTTP
    networks:
      - nextalk
    depends_on:
      prometheus:
        condition: service_healthy

  # ── Grafana ─────────────────────────────────────────────────────────────────
  # Единый UI: метрики (Prometheus), логи (Loki), трейсы (Tempo).
  # Datasources и дашборды провизионируются автоматически из /provisioning.
  grafana:
    image: grafana/grafana:13.0.1
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ENABLE_GZIP: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_FEATURE_TOGGLES_ENABLE: "traceToMetrics,traceToLogs"
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_started
    networks:
      - nextalk
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  nextalk:
    driver: bridge

volumes:
  prometheus-data:
  loki-data:
  tempo-data:
  grafana-data:
