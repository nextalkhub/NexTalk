# ─────────────────────────────────────────────────────────────────────────────
# NexTalk — Observability Stack
# Запуск вместе с основным docker-compose:
#
#   docker compose \
#     -f docker-compose.yaml \
#     -f infra/observability/docker-compose.observability.yml \
#     up -d
#
# Доступ (http):
#   Grafana     → http://localhost:3000   (admin / ${GRAFANA_ADMIN_PASSWORD:-admin})
#   Prometheus  → http://localhost:9090
#   Jaeger UI   → http://localhost:16686
#
# ─────────────────────────────────────────────────────────────────────────────
name: nextalk

services:

  # ───────────────────────────────────────────────────────────────────────────
  # OpenTelemetry Collector (contrib)
  # Принимает трейсы по OTLP gRPC/HTTP от микросервисов (Фаза 2),
  # маршрутизирует их в Jaeger. Метрики сервисов Prometheus собирает сам.
  # ───────────────────────────────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.152.0
    container_name: otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./infra/observability/otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"     # OTLP gRPC  (сервисы будут писать сюда в Фазе 2)
      - "4318:4318"     # OTLP HTTP
    networks:
      - nextalk
    depends_on:
      jaeger:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:13133/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ───────────────────────────────────────────────────────────────────────────
  # Jaeger v2 — all-in-one (dev, in-memory)
  # Хранилище и UI для распределённых трейсов.
  # Принимает OTLP от otel-collector на :4317 (внутренний порт).
  # UI: http://localhost:16686. Health check: :13133.
  # ───────────────────────────────────────────────────────────────────────────
  jaeger:
    image: jaegertracing/jaeger:2.18.0
    container_name: jaeger
    restart: unless-stopped
    command: ["--config=/etc/jaeger/config.yaml"]
    volumes:
      - ./infra/observability/jaeger/config.yaml:/etc/jaeger/config.yaml:ro
    ports:
      - "16686:16686"   # Jaeger UI + Query HTTP API
    networks:
      - nextalk
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:13133/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ───────────────────────────────────────────────────────────────────────────
  # Prometheus
  # Скрейпит /metrics у всех микросервисов каждые 15 секунд.
  # Хранение: 15 дней. Remote Write включён (для будущей интеграции с OTel).
  # ───────────────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.11.3
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
      - "--web.enable-remote-write-receiver"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    volumes:
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - nextalk
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ───────────────────────────────────────────────────────────────────────────
  # Loki
  # Агрегация и хранение логов. Single-binary mode, filesystem storage.
  # Logql-запросы через Grafana. Получает логи от Promtail.
  # ───────────────────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.7.2
    container_name: loki
    restart: unless-stopped
    # user: "0" — Loki 3.x работает под uid 10001, но Docker создаёт named volumes
    # с root:root. Loki не может писать в /loki/chunks → /ready возвращает 503.
    # В dev запускаем от root чтобы избежать проблем с правами.
    user: "0:0"
    command: ["-config.file=/etc/loki/config.yaml", "-target=all"]
    volumes:
      - ./infra/observability/loki/config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"   # открыт для дебага: curl http://localhost:3100/ready
    networks:
      - nextalk
    healthcheck:
      # Образ Loki 3.6+ — полностью distroless: нет sh, wget, curl, nc.
      # Единственный доступный бинарь — loki. -version выходит с кодом 0
      # если процесс жив. HTTP /ready проверить изнутри контейнера невозможно.
      # Для ручной проверки снаружи: curl http://localhost:3100/ready
      test: ["CMD", "loki", "-version"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 45s

  # ───────────────────────────────────────────────────────────────────────────
  # Grafana Alloy — сборщик логов (заменяет deprecated Promtail)
  # Читает stdout/stderr контейнеров nextalk через Docker API,
  # парсит Serilog CompactJson, пишет structured_metadata (trace_id/span_id).
  # UI (опционально): http://localhost:12345
  # ───────────────────────────────────────────────────────────────────────────
  alloy:
    image: grafana/alloy:v1.16.1
    container_name: alloy
    restart: unless-stopped
    command: ["run", "/etc/alloy/config.alloy"]
    volumes:
      - ./infra/observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - nextalk
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:12345/-/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ───────────────────────────────────────────────────────────────────────────
  # Grafana
  # Единый интерфейс для метрик (Prometheus), логов (Loki) и трейсов (Jaeger).
  # Datasources и dashboards провизионируются автоматически из /provisioning.
  # Доступ: http://localhost:3000  →  admin / ${GRAFANA_ADMIN_PASSWORD:-admin}
  # ───────────────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:13.0.1
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ENABLE_GZIP: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_FEATURE_TOGGLES_ENABLE: "traceToMetrics,traceToLogs"
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    networks:
      - nextalk
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  nextalk:
    driver: bridge

volumes:
  prometheus-data:
  loki-data:
  grafana-data:
