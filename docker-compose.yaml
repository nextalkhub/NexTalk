name: nextalk

services:
  nginx:
    image: nginx:${NGINX_TAG}
    restart: unless-stopped
    ports:
      - ${PROXY_HTTP_PUBLISHED_PORT}:80
    environment:
      - ZITADEL_DOMAIN=${ZITADEL_DOMAIN}
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx
    volumes:
      - ./infra/nginx/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./infra/nginx/swagger.html:/etc/nginx/swagger/swagger.html:ro
      - ./infra/nginx/oauth2-redirect.html:/etc/nginx/swagger/oauth2-redirect.html:ro
      - ./infra/nginx/oauth2-redirect.js:/etc/nginx/swagger/oauth2-redirect.js:ro
      - zitadel-output:/etc/nginx/swagger-config:ro
    depends_on:
      zitadel-api:
        condition: service_healthy
      zitadel-login:
        condition: service_healthy
      zitadel-bootstrap:
        condition: service_completed_successfully
      guild-service:
        condition: service_healthy
      messaging-service:
        condition: service_healthy
      voice-service:
        condition: service_healthy
      websocket-gateway:
        condition: service_healthy
      web-spa:
        condition: service_healthy
    networks:
      - nextalk
      - zitadel
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  web-spa:
    build:
      context: ./src/web
      dockerfile: Dockerfile
      args:
        VITE_OIDC_AUTHORITY: ${ZITADEL_PUBLIC_SCHEME}://${ZITADEL_DOMAIN}:${ZITADEL_EXTERNALPORT}
        VITE_OIDC_CLIENT_ID: ${VITE_OIDC_CLIENT_ID}
        VITE_OIDC_REDIRECT_URI: ${ZITADEL_PUBLIC_SCHEME}://${ZITADEL_DOMAIN}:${PROXY_HTTP_PUBLISHED_PORT}/callback
        VITE_LIVEKIT_URL: http://${ZITADEL_DOMAIN}:${PROXY_HTTP_PUBLISHED_PORT}/livekit
        VITE_WS_URL: http://${ZITADEL_DOMAIN}:${PROXY_HTTP_PUBLISHED_PORT}/hubs/chat
        VITE_USE_AUTH_MOCK: ${VITE_USE_AUTH_MOCK:-false}
    restart: unless-stopped
    networks:
      - nextalk
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "80"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  guild-service:
    build:
      context: ./src/guild-service
      dockerfile: Dockerfile
    container_name: backend-guild
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: http://+:5001
      ConnectionStrings__PostgresConnection: ${NEXTALK_DATABASE_POSTGRES_DSN}
      ConnectionStrings__Redis: redis:6379,defaultDatabase=1
      Zitadel__Authority: ${ZITADEL_PUBLIC_SCHEME}://${ZITADEL_DOMAIN}:${ZITADEL_EXTERNALPORT}
      Zitadel__MetadataAddress: http://zitadel-api:8080/.well-known/openid-configuration
      Services__WebSocketGateway: http://websocket-gateway:5004
      Services__VoiceService: http://voice-service:5003
    volumes:
      - zitadel-output:/zitadel-config:ro
    networks:
      - nextalk
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      zitadel-bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/readyz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  messaging-service:
    build:
      context: ./src/messaging-service
      dockerfile: Dockerfile
    container_name: backend-messaging
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: http://+:5002
      ConnectionStrings__PostgresConnection: ${NEXTALK_DATABASE_POSTGRES_DSN}
      Zitadel__Authority: ${ZITADEL_PUBLIC_SCHEME}://${ZITADEL_DOMAIN}:${ZITADEL_EXTERNALPORT}
      Zitadel__MetadataAddress: http://zitadel-api:8080/.well-known/openid-configuration
      Services__WebSocketGateway: http://websocket-gateway:5004
      Services__GuildService: http://guild-service:5001
    volumes:
      - zitadel-output:/zitadel-config:ro
    networks:
      - nextalk
    depends_on:
      postgres:
        condition: service_healthy
      zitadel-bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/readyz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  voice-service:
    build:
      context: ./src/voice-service
      dockerfile: Dockerfile
    container_name: backend-voice
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: http://+:5003
      Zitadel__Authority: ${ZITADEL_PUBLIC_SCHEME}://${ZITADEL_DOMAIN}:${ZITADEL_EXTERNALPORT}
      Zitadel__MetadataAddress: http://zitadel-api:8080/.well-known/openid-configuration
      LiveKit__Host: http://livekit:7880
      LiveKit__ApiKey: ${LIVEKIT_API_KEY}
      LiveKit__SecretKey: ${LIVEKIT_SECRET_KEY}
      Services__GuildService: http://guild-service:5001
    volumes:
      - zitadel-output:/zitadel-config:ro
    networks:
      - nextalk
    depends_on:
      livekit:
        condition: service_healthy
      zitadel-bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/readyz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  websocket-gateway:
    build:
      context: ./src/websocket-gateway
      dockerfile: Dockerfile
    container_name: backend-ws-gateway
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: http://+:5004
      Zitadel__Authority: ${ZITADEL_PUBLIC_SCHEME}://${ZITADEL_DOMAIN}:${ZITADEL_EXTERNALPORT}
      Zitadel__MetadataAddress: http://zitadel-api:8080/.well-known/openid-configuration
      ConnectionStrings__Redis: redis:6379,defaultDatabase=2
      Services__GuildService: http://guild-service:5001
      Services__MessagingService: http://messaging-service:5002
      Presence__HeartbeatInterval: 20
      Presence__OfflineTimeout: 30
    volumes:
      - zitadel-output:/zitadel-config:ro
    networks:
      - nextalk
    depends_on:
      redis:
        condition: service_healthy
      zitadel-bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5004/readyz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${POSTGRES_DB} -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 30s
      retries: 10
      start_period: 20s
    volumes:
      - postgres-data:/var/lib/postgresql:rw
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - nextalk
      - zitadel

  redis:
    image: redis:${REDIS_TAG}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nextalk

  zitadel-bootstrap:
    image: alpine:3.20
    restart: "no"
    command: sh /bootstrap/bootstrap.sh
    environment:
      ZITADEL_DOMAIN: ${ZITADEL_DOMAIN}
      ZITADEL_EXTERNALPORT: ${ZITADEL_EXTERNALPORT}
      ZITADEL_PUBLIC_SCHEME: ${ZITADEL_PUBLIC_SCHEME:-http}
    volumes:
      - ./infra/zitadel/bootstrap.sh:/bootstrap/bootstrap.sh:ro
      - zitadel-bootstrap:/zitadel/bootstrap:ro
      - zitadel-output:/output:rw
    networks:
      - zitadel
    depends_on:
      zitadel-api:
        condition: service_healthy

  zitadel-api:
    image: ghcr.io/zitadel/zitadel:${ZITADEL_TAG}
    restart: unless-stopped
    user: "0"
    command: start-from-init --masterkey "${ZITADEL_MASTERKEY}"
    environment:
      ZITADEL_PORT: 8080
      ZITADEL_EXTERNALDOMAIN: ${ZITADEL_DOMAIN}
      ZITADEL_EXTERNALPORT: ${ZITADEL_EXTERNALPORT}
      ZITADEL_EXTERNALSECURE: ${ZITADEL_EXTERNALSECURE}
      ZITADEL_TLS_ENABLED: false
      
      ZITADEL_DATABASE_POSTGRES_DSN: ${ZITADEL_DATABASE_POSTGRES_DSN}
      
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: false
      ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH: /zitadel/bootstrap/login-client.pat
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_USERNAME: login-client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_NAME: Login Client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_PAT_EXPIRATIONDATE: ${LOGIN_CLIENT_PAT_EXPIRATION}

      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: bootstrap-sa
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: Bootstrap Service Account
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: ${LOGIN_CLIENT_PAT_EXPIRATION}
      ZITADEL_FIRSTINSTANCE_PATPATH: /zitadel/bootstrap/bootstrap-sa.pat
      
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: true
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_BASEURI: ${ZITADEL_PUBLIC_SCHEME}://${ZITADEL_DOMAIN}:${ZITADEL_EXTERNALPORT}/ui/v2/login/
      ZITADEL_OIDC_DEFAULTLOGINURLV2: ${ZITADEL_PUBLIC_SCHEME}://${ZITADEL_DOMAIN}:${ZITADEL_EXTERNALPORT}/ui/v2/login/login?authRequest=
      ZITADEL_OIDC_DEFAULTLOGOUTURLV2: ${ZITADEL_PUBLIC_SCHEME}://${ZITADEL_DOMAIN}:${ZITADEL_EXTERNALPORT}/ui/v2/login/logout?post_logout_redirect=
      ZITADEL_SAML_DEFAULTLOGINURLV2: ${ZITADEL_PUBLIC_SCHEME}://${ZITADEL_DOMAIN}:${ZITADEL_EXTERNALPORT}/ui/v2/login/login?samlRequest=
      
      ZITADEL_LOGSTORE_ACCESS_STDOUT_ENABLED: ${ZITADEL_ACCESS_LOG_STDOUT_ENABLED}
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 20s
    volumes:
      - zitadel-bootstrap:/zitadel/bootstrap:rw
    networks:
      - zitadel
      - nextalk
    depends_on:
      postgres:
        condition: service_healthy

  zitadel-login:
    image: ghcr.io/zitadel/zitadel-login:${ZITADEL_TAG}
    restart: unless-stopped
    user: "0"
    environment:
      ZITADEL_API_URL: http://zitadel-api:8080
      NEXT_PUBLIC_BASE_PATH: /ui/v2/login
      ZITADEL_SERVICE_USER_TOKEN_FILE: /zitadel/bootstrap/login-client.pat
      CUSTOM_REQUEST_HEADERS: Host:${ZITADEL_DOMAIN}:${ZITADEL_EXTERNALPORT},X-Forwarded-Proto:${ZITADEL_PUBLIC_SCHEME}
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "node /app/healthcheck.mjs http://localhost:3000/ui/v2/login/healthy"]
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 20s
    volumes:
      - zitadel-bootstrap:/zitadel/bootstrap:ro
    networks:
      - zitadel
    depends_on:
      zitadel-api:
        condition: service_healthy

  livekit:
    image: livekit/livekit-server:${LIVEKIT_IMAGE}
    restart: unless-stopped
    ports:
      - "7880:7880"
      - "7881:7881/tcp"
      - "50000-50200:50000-50200/udp"
    volumes:
      - ./infra/livekit/livekit.yaml:/etc/livekit.yaml:ro
    command: --config /etc/livekit.yaml
    networks:
      - nextalk
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7880"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  nextalk:
    driver: bridge
  zitadel:
    driver: bridge

volumes:
  postgres-data:
  zitadel-bootstrap:
  zitadel-output: